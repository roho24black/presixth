<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pre-Sixth">
<meta name="theme-color" content="#0b1020">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Pre-Sixth Prep · KESW</title>
<style>
  :root{
    --bg:#070b16; --bg2:#0e1426; --card:#141d36; --card2:#1a2444;
    --line:#2a3a63; --txt:#eef2ff; --mut:#9fb0d8; --mut2:#6f7fab;
    --acc:#6ea8fe; --acc2:#a78bfa; --acc3:#fb7bb5; --acc4:#34e0c8;
    --good:#34d399; --bad:#fb7185; --warn:#fbbf24;
    --glass:rgba(22,31,58,.62); --glassb:rgba(150,170,230,.16);
    --r:20px; --shadow:0 12px 34px rgba(0,0,0,.42);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    overscroll-behavior-y:none;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;position:relative;
    padding:env(safe-area-inset-top) 0 calc(104px + env(safe-area-inset-bottom));background:var(--bg)}
  body::before{content:"";position:fixed;inset:-20% -10% auto -10%;height:72vh;z-index:-1;pointer-events:none;
    background:
      radial-gradient(45% 50% at 16% 6%, rgba(110,168,254,.32), transparent 70%),
      radial-gradient(45% 50% at 86% 0%, rgba(167,139,250,.30), transparent 70%),
      radial-gradient(40% 45% at 60% 32%, rgba(251,123,181,.16), transparent 70%)}
  .wrap{max-width:560px;margin:0 auto;padding:14px}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em}
  .mut{color:var(--mut)} .small{font-size:13px}
  .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .grow{flex:1}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  .hidden{display:none!important}

  /* top */
  .top{padding:10px 2px 4px}
  .brand{font-size:12px;color:var(--mut);letter-spacing:.2em;text-transform:uppercase;font-weight:800}
  .hi{font-size:27px;margin-top:4px;font-weight:800;letter-spacing:-.03em}

  /* chips / stat */
  .stats{display:flex;gap:10px;margin-top:16px}
  .stat{flex:1;background:var(--glass);border:1px solid var(--glassb);border-radius:var(--r);padding:13px 12px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .stat b{font-size:23px;display:block;line-height:1.1;font-weight:800}
  .stat span{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}

  .panel{background:var(--glass);border:1px solid var(--glassb);border-radius:var(--r);padding:17px;margin-top:14px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:var(--shadow)}

  /* ring */
  .ring{display:flex;align-items:center;gap:14px}
  .ringsvg{width:64px;height:64px;flex:none}
  .ringsvg circle{fill:none;stroke-width:7;stroke-linecap:round}
  .ringbg{stroke:rgba(150,170,230,.16)}
  .ringfg{stroke:url(#g);transition:stroke-dashoffset .6s ease}

  /* countdown */
  .count{display:flex;gap:8px;margin-top:12px}
  .count div{flex:1;background:rgba(8,12,24,.5);border:1px solid var(--glassb);border-radius:14px;padding:11px 6px;text-align:center}
  .count b{font-size:21px;display:block;font-weight:800}
  .count span{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}

  /* subject grid */
  .secttl{margin:22px 2px 10px;font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.12em;font-weight:800}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .subj{position:relative;border:1px solid var(--glassb);border-radius:var(--r);padding:15px;
    background:var(--glass);overflow:hidden;text-align:left;transition:transform .14s;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .subj:active{transform:scale(.96)}
  .subj .ic{font-size:23px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:14px;
    background:rgba(255,255,255,.06);background:color-mix(in srgb,var(--theme,#6ea8fe) 24%,transparent);
    border:1px solid var(--glassb);border:1px solid color-mix(in srgb,var(--theme,#6ea8fe) 40%,transparent)}
  .subj h3{font-size:16px;margin-top:11px;font-weight:800}
  .subj .ex{font-size:11px;color:var(--mut2);margin-top:2px}
  .subj .bar{height:6px;border-radius:6px;background:rgba(8,12,24,.6);margin-top:13px;overflow:hidden}
  .subj .bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
  .subj .pc{font-size:11px;color:var(--mut);margin-top:7px;display:flex;justify-content:space-between;font-weight:600}
  .glow{position:absolute;inset:0;opacity:.20;pointer-events:none}

  /* generic card / list */
  .item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--glassb);
    border-radius:16px;background:var(--glass);margin-bottom:10px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}

  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:16px;
    font-weight:800;font-size:15px;background:rgba(255,255,255,.05);border:1px solid var(--glassb);color:var(--txt)}
  .btn.acc{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#0a0f1f;
    box-shadow:0 10px 24px rgba(122,150,255,.34)}
  .btn.full{width:100%}
  .btn:active{transform:scale(.985);filter:brightness(.97)}
  .btn.sm{padding:10px 12px;font-size:13px;border-radius:12px}
  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}

  /* flashcard */
  .deckwrap{margin-top:10px}
  .fcard{position:relative;height:360px;border-radius:24px}
  .face{position:absolute;top:0;left:0;width:100%;height:100%;
    border:1px solid var(--glassb);border-radius:24px;padding:24px;display:flex;flex-direction:column;
    justify-content:center;align-items:center;text-align:center;
    background:linear-gradient(160deg,rgba(36,48,86,.92),rgba(16,22,42,.94));box-shadow:var(--shadow);
    opacity:0;visibility:hidden;transform:scale(.96);transition:opacity .28s ease, transform .28s ease}
  .face.front{opacity:1;visibility:visible;transform:none}
  .fcard.flip .face.front{opacity:0;visibility:hidden;transform:scale(.96)}
  .fcard.flip .face.rear{opacity:1;visibility:visible;transform:none}
  .face.rear{justify-content:flex-start;align-items:flex-start;text-align:left;overflow:auto}
  .term{font-size:31px;font-weight:800;letter-spacing:-.02em}
  .ipa{color:var(--mut);margin-top:6px;font-size:14px}
  .tap{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:var(--mut2);font-size:12px}
  .speaker{margin-top:18px;width:66px;height:66px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:26px;background:rgba(255,255,255,.06);border:1px solid var(--glassb)}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--acc);font-weight:800;margin:14px 0 4px}
  .ru{font-size:23px;font-weight:800}
  .def{margin-top:2px;color:var(--txt);line-height:1.45}
  .ex{color:var(--mut);font-style:italic;line-height:1.5;margin-top:2px}
  .progressline{height:7px;background:rgba(8,12,24,.6);border-radius:7px;overflow:hidden;margin:6px 0 12px}
  .progressline i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .3s}

  /* quiz */
  .opt{padding:15px 16px;border:1px solid var(--glassb);border-radius:15px;background:var(--glass);
    margin-bottom:10px;font-size:16px;font-weight:700;transition:.15s;text-align:left;width:100%;color:var(--txt);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .opt:active{transform:scale(.99)}
  .opt.correct{background:rgba(52,211,153,.18);border-color:var(--good)}
  .opt.wrong{background:rgba(251,113,133,.16);border-color:var(--bad)}
  .opt.dim{opacity:.45}
  .qhead{font-size:13px;color:var(--mut);margin-bottom:6px}
  .qprompt{font-size:25px;font-weight:800;margin:4px 0 18px;line-height:1.25}

  /* bottom nav — floating pill */
  .nav{position:fixed;left:12px;right:12px;bottom:calc(8px + env(safe-area-inset-bottom));z-index:50;
    background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
    border:1px solid var(--glassb);border-radius:24px;box-shadow:var(--shadow);padding:6px}
  .navin{max-width:540px;margin:0 auto;display:flex;gap:4px}
  .nav button{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10px;color:var(--mut2);padding:9px 4px;border-radius:17px;transition:.2s;font-weight:700}
  .nav button .ni{font-size:20px}
  .nav button.on{color:#fff;background:linear-gradient(135deg,rgba(110,168,254,.24),rgba(167,139,250,.24))}

  .iconbtn{width:42px;height:42px;border-radius:13px;background:rgba(255,255,255,.06);border:1px solid var(--glassb);
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:rgba(14,20,38,.95);border:1px solid var(--glassb);padding:11px 18px;border-radius:999px;font-size:13px;
    transition:.25s;z-index:80;pointer-events:none;font-weight:700;backdrop-filter:blur(10px)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .pill{display:inline-flex;gap:6px;align-items:center;font-size:12px;color:var(--mut);
    background:rgba(8,12,24,.5);border:1px solid var(--glassb);padding:5px 11px;border-radius:999px;font-weight:600}
  .empty{text-align:center;color:var(--mut);padding:38px 20px}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .back{font-size:21px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;
    border-radius:13px;background:rgba(255,255,255,.06);border:1px solid var(--glassb);flex:none}
  .seg{display:flex;background:rgba(8,12,24,.5);border:1px solid var(--glassb);border-radius:14px;padding:4px;gap:4px;margin-top:12px}
  .seg button{flex:1;padding:10px;border-radius:11px;font-size:13px;font-weight:800;color:var(--mut);background:none}
  .seg button.on{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0a0f1f}
  .tag{font-size:11px;color:var(--mut);background:rgba(8,12,24,.5);border:1px solid var(--glassb);
    padding:5px 10px;border-radius:999px;margin:0 6px 6px 0;display:inline-block;font-weight:600}
  .ok{color:var(--good)} .ko{color:var(--bad)}
  .fade{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .conf{position:fixed;inset:0;pointer-events:none;z-index:90}

  /* hero (home) */
  .hero{position:relative;overflow:hidden;border-radius:24px;padding:18px;margin-top:16px;
    background:linear-gradient(135deg,rgba(110,168,254,.22),rgba(167,139,250,.18),rgba(251,123,181,.12));
    border:1px solid var(--glassb);box-shadow:var(--shadow)}

  /* quick links (home) */
  .qrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .ql{position:relative;overflow:hidden;text-align:left;border-radius:18px;padding:15px;border:1px solid var(--glassb);
    background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:transform .14s}
  .ql:active{transform:scale(.96)}
  .ql .ic{font-size:24px}
  .ql b{display:block;margin-top:8px;font-size:15px;font-weight:800}
  .ql span{font-size:11.5px;color:var(--mut)}

  /* grammar lessons */
  .lesson h3{font-size:16px;font-weight:800}
  .lessonbody{line-height:1.6;color:var(--txt)}
  .lessonbody p{margin:0 0 10px}
  .exline{padding:11px 13px;border-radius:13px;background:rgba(8,12,24,.4);border:1px solid var(--glassb);margin-bottom:8px}
  .exline .en{font-weight:700}
  .exline .ru{font-size:13px;font-weight:500;color:var(--mut);margin-top:2px}
  .callout{border-radius:14px;padding:13px 14px;margin-top:12px;border:1px solid var(--glassb);background:rgba(52,211,153,.12)}
  .callout.bad{background:rgba(251,113,133,.12)}
  .callout b{display:block;margin-bottom:5px}

  /* essay phrases / slang */
  .pgroup{font-size:12px;color:var(--acc);text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin:18px 2px 8px}
  .reg{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:3px 8px;border-radius:999px;border:1px solid var(--glassb);white-space:nowrap}
  .reg.uk{color:#7ee0ff;background:rgba(80,200,255,.12)}
  .reg.txt{color:#ffd27e;background:rgba(255,200,90,.12)}
  .reg.gen{color:#c8b3ff;background:rgba(167,139,250,.16)}

  /* ===================== GAME / SESSION SCREENS ===================== */
  .game{--theme:#6ea8fe}
  .gtop{display:flex;align-items:center;gap:11px;margin:2px 0}
  .gbar{flex:1;height:12px;border-radius:12px;background:rgba(8,12,24,.6);overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.5)}
  .gbar i{display:block;height:100%;border-radius:12px;background:linear-gradient(90deg,var(--theme),#c8a6ff);
    box-shadow:0 0 14px var(--theme);transition:width .4s cubic-bezier(.4,1.2,.5,1)}
  .combo{display:flex;align-items:center;gap:3px;font-size:14px;font-weight:800;color:#ffd27e;
    background:rgba(255,180,90,.16);border:1px solid rgba(255,180,90,.45);padding:5px 10px;border-radius:999px;animation:pump .4s ease}
  .combo b{font-size:15px}
  .count2{font-size:14px;font-weight:800;color:var(--txt)}
  .count2 span{color:var(--mut2)}
  .gsub{margin:10px 0 2px}
  .subjchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--txt);padding:6px 12px;border-radius:999px;
    background:rgba(110,168,254,.16);background:color-mix(in srgb,var(--theme) 18%,transparent);
    border:1px solid color-mix(in srgb,var(--theme) 42%,var(--glassb))}

  .qcard{position:relative;overflow:hidden;border-radius:24px;padding:26px 20px;margin-top:10px;text-align:center;
    background:linear-gradient(160deg,rgba(36,48,86,.9),rgba(14,20,38,.94));
    background:radial-gradient(130% 130% at 50% -25%, color-mix(in srgb,var(--theme) 30%,transparent), transparent 58%),linear-gradient(160deg,rgba(36,48,86,.9),rgba(14,20,38,.94));
    border:1px solid color-mix(in srgb,var(--theme) 32%,var(--glassb));box-shadow:0 16px 42px rgba(0,0,0,.46)}
  .qtype{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;
    color:var(--theme);padding:6px 12px;border-radius:999px;margin-bottom:14px;
    background:rgba(110,168,254,.14);background:color-mix(in srgb,var(--theme) 16%,transparent);
    border:1px solid color-mix(in srgb,var(--theme) 36%,transparent)}
  .qbig{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.18}
  .qsmall{font-size:14px;color:var(--mut);margin-top:8px}

  .optgrid{margin-top:16px}
  .opt{display:flex;align-items:center;gap:13px;padding:15px 16px;border:1px solid var(--glassb);border-radius:16px;margin-bottom:11px;
    background:linear-gradient(160deg,rgba(255,255,255,.055),rgba(255,255,255,.02));
    font-size:16px;font-weight:700;text-align:left;width:100%;color:var(--txt);
    transition:transform .12s, background .2s, border-color .2s;animation:popin .35s both;box-shadow:0 6px 16px rgba(0,0,0,.22)}
  .opt .bdg{width:30px;height:30px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;background:rgba(255,255,255,.08);border:1px solid var(--glassb);color:var(--mut)}
  .opt .lab{flex:1}
  .opt .mk{font-size:18px;font-weight:800;width:18px;text-align:center}
  .opt:active{transform:scale(.985)}
  .opt.correct{background:linear-gradient(160deg,rgba(52,211,153,.24),rgba(52,211,153,.07));border-color:var(--good)}
  .opt.correct .bdg{background:var(--good);color:#06241a;border-color:var(--good)}
  .opt.correct .mk{color:var(--good)}
  .opt.wrong{background:linear-gradient(160deg,rgba(251,113,133,.22),rgba(251,113,133,.06));border-color:var(--bad);animation:shake .4s}
  .opt.wrong .bdg{background:var(--bad);color:#2a0710;border-color:var(--bad)}
  .opt.wrong .mk{color:var(--bad)}
  .opt.dim{opacity:.4}

  /* build: slots + keycaps */
  .kbpanel{margin-top:18px}
  .slotrow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0 10px}
  .slotbox{width:38px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:800;color:var(--txt);
    background:rgba(8,12,24,.5);border:2px solid var(--glassb);transition:.18s}
  .slotbox.filled{border-color:color-mix(in srgb,var(--theme) 65%,var(--glassb));background:color-mix(in srgb,var(--theme) 14%,rgba(8,12,24,.5))}
  .slotbox.ok{border-color:var(--good);background:rgba(52,211,153,.16);color:var(--good)}
  .slotbox.no{border-color:var(--bad);background:rgba(251,113,133,.15);color:var(--bad);animation:shake .4s}
  .keys{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px}
  .key{width:52px;height:56px;border-radius:14px;font-size:22px;font-weight:800;color:var(--txt);
    background:linear-gradient(180deg,#3a4a78,#222d52);border:1px solid rgba(160,180,235,.24);
    box-shadow:0 5px 0 rgba(8,11,24,.85),0 9px 18px rgba(0,0,0,.42);transition:transform .08s,box-shadow .08s,opacity .15s;animation:popin .3s both}
  .key:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(8,11,24,.85),0 3px 8px rgba(0,0,0,.4)}
  .key.used{opacity:.2;pointer-events:none;box-shadow:none;transform:translateY(4px)}

  .tinput{width:100%;margin-top:16px;padding:18px;border-radius:16px;border:2px solid var(--glassb);background:rgba(8,12,24,.5);
    color:var(--txt);font-size:20px;font-weight:800;text-align:center;outline:none;transition:.2s;letter-spacing:.5px}
  .tinput:focus{border-color:var(--theme);box-shadow:0 0 0 4px color-mix(in srgb,var(--theme) 20%,transparent)}

  .fbcard{margin-top:14px;border-radius:18px;padding:16px;border:1px solid var(--glassb);animation:slideup .3s both;box-shadow:var(--shadow)}
  .fbcard.ok{background:linear-gradient(160deg,rgba(52,211,153,.16),rgba(52,211,153,.05));border-color:rgba(52,211,153,.5)}
  .fbcard.no{background:linear-gradient(160deg,rgba(251,113,133,.16),rgba(251,113,133,.05));border-color:rgba(251,113,133,.5)}
  .fbcard .head{font-weight:800;font-size:16px}
  .fbcard .big{font-size:21px;font-weight:800}

  @keyframes popin{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes slideup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
  @keyframes pump{0%{transform:scale(1)}45%{transform:scale(1.18)}100%{transform:scale(1)}}

  /* ===================== DESIGN SYSTEM COMPONENTS ===================== */
  .phead{padding:8px 2px 2px}
  .phead .eyebrow{font-size:11.5px;color:var(--mut);letter-spacing:.2em;text-transform:uppercase;font-weight:800}
  .phead .ttl{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-top:5px;line-height:1.1}
  .phead .sub{font-size:14px;color:var(--mut);margin-top:7px;line-height:1.5}

  /* subject action tiles */
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
  .tile{display:flex;align-items:center;gap:12px;padding:15px;border-radius:18px;border:1px solid var(--glassb);text-align:left;
    transition:transform .12s;box-shadow:0 6px 16px rgba(0,0,0,.2);
    background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.015))}
  .tile:active{transform:scale(.97)}

function lessonById(id){ return GRAMMAR.lessons.find(l=>l.id===id); }
function itemId(mid,i){ return mid+"#"+i; }

/* =========================================================================
   STATE
   ========================================================================= */
const SKEY="presixth_v2";
let S = load();
function load(){
  try{ const r=JSON.parse(localStorage.getItem(SKEY)); if(r) return r; }catch(e){}
  return { xp:0, streak:0, lastDay:null, todayCount:0, todayDay:null, mastery:{}, voiceName:null, rate:0.95, sound:true };
}
function save(){ localStorage.setItem(SKEY, JSON.stringify(S)); }
function plural(n,one,few,many){ n=Math.abs(n)%100; const d=n%10; if(n>10&&n<20)return many; if(d>1&&d<5)return few; if(d===1)return one; return many; }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function rollDay(){
  const t=todayStr();
  if(S.todayDay!==t){ S.todayDay=t; S.todayCount=0; }
}
function registerStudy(n){
  rollDay();
  const t=todayStr();
  if(S.lastDay!==t){
    // streak logic
    const y=new Date(); y.setDate(y.getDate()-1);
    const ys=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
    S.streak = (S.lastDay===ys)? (S.streak+1) : 1;
    S.lastDay=t;
  }
  S.xp += n;
  S.todayCount = (S.todayCount||0)+1;
  save();
}
function masteryOf(id){ return S.mastery[id]||0; }   // 0..5
function bump(id, up){
  const cur=masteryOf(id);
  S.mastery[id] = up ? Math.min(5,cur+1) : 0;
  save();
}
function moduleProgress(m){
  let learned=0;
  m.terms.forEach((_,i)=>{ if(masteryOf(itemId(m.id,i))>=3) learned++; });
  return {learned, total:m.terms.length, pct: Math.round(learned/m.terms.length*100)};
}
function overallLearned(){
  let n=0;
  MODULES.forEach(m=>m.terms.forEach((_,i)=>{ if(masteryOf(itemId(m.id,i))>=3) n++; }));
  return n;
}
function levelInfo(){
  const lv = Math.floor(S.xp/200)+1;
  const into = S.xp%200;
  return { lv, into, pct: Math.round(into/200*100) };
}

/* =========================================================================
   SPEECH (British voice)
   ========================================================================= */
let VOICES=[];
function loadVoices(){ VOICES = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
/* English voices only, ranked best-first (enhanced/natural UK voices on top) */
function enVoices(){
  if(!VOICES.length) loadVoices();
  const en=VOICES.filter(v=>/^en/i.test(v.lang));
  const score=v=>{
    let s=0; const n=(v.name||"")+" "+(v.lang||"");
    if(/en[-_]GB/i.test(v.lang)) s+=40;                      // British accent
    if(/enhanced|premium|natural|neural|siri/i.test(n)) s+=30; // higher quality
    if(/Serena|Stephanie|Kate|Martha|Jamie|Arthur|Daniel|Sonia|Libby|Ryan/i.test(n)) s+=12;
    if(/Google/i.test(n)) s+=8;
    if(/female|woman/i.test(n)) s+=2;
    if(v.localService) s+=3;
    return s;
  };
  return en.sort((a,b)=>score(b)-score(a));
}
function pickVoice(){
  const list=enVoices();
  if(S.voiceName){ const m=list.find(v=>v.name===S.voiceName); if(m) return m; }
  return list[0] || null;
}
function speak(text, rate){
  if(!window.speechSynthesis) { toast("🔇 Озвучка недоступна на этом устройстве"); return; }
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(String(text).replace(/[²³]/g," squared ").replace(/\s*\/\s*/g," or "));
    const v=pickVoice(); if(v){ u.voice=v; u.lang=v.lang; } else { u.lang="en-GB"; }
    u.rate=rate || S.rate || 0.95; u.pitch=1.05;
    speechSynthesis.speak(u);
  }catch(e){}
}

    <circle class="ringbg" cx="31" cy="31" r="${r}"></circle>
    <circle class="ringfg" cx="31" cy="31" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}"

    <text x="31" y="36" text-anchor="middle" font-size="15" font-weight="800" fill="#eaf0ff">${pct}%</text>
  </svg>`;
}

/* ---------- SOUND FX + HAPTICS ---------- */
let AC=null;
function audioCtx(){ try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); }catch(e){} return AC; }
function sfx(kind){
  if(S.sound===false) return;
  const ac=audioCtx(); if(!ac) return;
  try{
    const now=ac.currentTime;
    const beep=(f1,f2,dur,type,delay)=>{ const o=ac.createOscillator(), g=ac.createGain(); o.type=type||'sine';
      o.connect(g); g.connect(ac.destination); const t0=now+(delay||0);
      o.frequency.setValueAtTime(f1,t0); if(f2) o.frequency.exponentialRampToValueAtTime(f2,t0+dur);
      g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.13,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
      o.start(t0); o.stop(t0+dur+0.03); };
    if(kind==='good') beep(620,940,0.15,'sine');
    else if(kind==='bad') beep(240,150,0.22,'triangle');
    else if(kind==='win'){ beep(660,990,0.13,'sine',0); beep(880,1320,0.16,'sine',0.12); }
    else beep(820,null,0.07,'sine');
  }catch(e){}
}
function haptic(ms){ try{ navigator.vibrate && navigator.vibrate(ms||10); }catch(e){} }

let sess=null;
function startSession(list, backName, backId, title){
  sess={ list, i:0, correct:0, combo:0, bestCombo:0, locked:false, flip:false, backName, backId, title:title||"Готово" };

function renderStudy(id){

    .sort((a,b)=>masteryOf(a.key)-masteryOf(b.key));

}
function sessBack(){ go(sess.backName, sess.backId); }
function modOf(cur){ return moduleById(cur.key.split('#')[0]); }

function sessHeader(){

function chooseExercise(t){
  const w=t.en.replace(/[^A-Za-z]/g,"");
  const single=/^[A-Za-z'’.\-]+$/.test(t.en) && w.length>=3 && w.length<=11;
  const pool = single ? ['choose','build','type','listen','choose','flip'] : ['choose','listen','choose','flip'];
  return pool[Math.floor(Math.random()*pool.length)];
}
function drawStep(){
  if(sess.i>=sess.list.length) return sessDone();
  sess.locked=false; sess.flip=false; sess.build=null;
  const cur=sess.list[sess.i];
  const type=chooseExercise(cur.t);
  if(type==='choose') return stepChoose(cur);
  if(type==='type')   return stepType(cur);
  if(type==='build')  return stepBuild(cur);
  if(type==='listen') return stepListen(cur);

}

function attachSwipe(){
  const c=document.getElementById('fcard'); if(!c) return;
  let sx=0,sy=0,dx=0;
  const move=e=>{ const p=e.touches?e.touches[0]:e; dx=p.clientX-sx; const dy=p.clientY-sy;
    if(Math.abs(dx)<Math.abs(dy)&&Math.abs(dx)<10) return;
    c.style.transform=`translateX(${dx}px) rotate(${dx/22}deg)`; c.style.opacity=String(1-Math.min(Math.abs(dx)/420,0.5)); };
  const end=()=>{ document.removeEventListener('touchmove',move); document.removeEventListener('touchend',end);
    document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',end);
    c.style.transition='transform .25s, opacity .25s';
    if(Math.abs(dx)>90){ const known=dx>0; c.style.transform=`translateX(${known?640:-640}px) rotate(${known?28:-28}deg)`; c.style.opacity='0'; setTimeout(()=>flipAnswer(known),170); }
    else { c.style.transform=''; c.style.opacity='1'; } };
  const start=e=>{ const p=e.touches?e.touches[0]:e; sx=p.clientX; sy=p.clientY; dx=0; c.style.transition='none';
    document.addEventListener('touchmove',move,{passive:true}); document.addEventListener('touchend',end);
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',end); };
  c.addEventListener('touchstart',start,{passive:true}); c.addEventListener('mousedown',start);
}

let quiz={list:[],i:0,score:0,mid:null,locked:false};
function renderQuiz(id){
  const m=moduleById(id);
  const pool=m.terms.map((t,i)=>({t,i}));
  shuffle(pool);

}
function drawQuiz(){
  const m=moduleById(quiz.mid);
  if(quiz.i>=quiz.list.length) return quizDone(m);
  const cur=quiz.list[quiz.i];
  const reverse = Math.random()<0.5; // sometimes EN->RU, sometimes RU->EN
  const prompt = reverse ? cur.t.ru : cur.t.en;
  const answer = reverse ? cur.t.en : cur.t.ru;
  // build options
  const others=m.terms.filter((_,i)=>i!==cur.i);
  shuffle(others);
  const opts=[answer, ...others.slice(0,3).map(o=>reverse?o.en:o.ru)];
  shuffle(opts);
  quiz._answer=answer; quiz._reverse=reverse; quiz.locked=false;
  const pct=Math.round(quiz.i/quiz.list.length*100); const color=m.color||'#6ea8fe';
  app.innerHTML=`<div class="wrap fade game" style="--theme:${color}">
    ${gameTop(`${m.ic} Тест · ${m.name}`,pct,{back:`go('subject','${m.id}')`,i:quiz.i+1,n:quiz.list.length})}

      ${reverse?'':`<button class="speaker" style="margin-top:14px;width:54px;height:54px;font-size:22px" onclick="speak('${esc(cur.t.en)}')">🔊</button>`}
    </div>

}
function pickOpt(btn,val){
  if(quiz.locked) return; quiz.locked=true;
  const cur=quiz.list[quiz.i]; const correct=decode(val)===quiz._answer;
  markOpts(btn,quiz._answer,correct);
  if(correct){ quiz.score++; bump(itemId(quiz.mid,cur.i),true); registerStudy(10); sfx('good'); haptic(8); }
  else { bump(itemId(quiz.mid,cur.i),false); registerStudy(3); sfx('bad'); haptic(40); if(!quiz._reverse) speak(cur.t.en); }
  setTimeout(()=>{ quiz.i++; drawQuiz(); window.scrollTo(0,0); }, correct?700:1450);
}

      <button class="speaker" style="margin:4px auto 2px;width:94px;height:94px;font-size:40px" onclick="speak('${esc(cur.t.en)}')">🔊</button>
      <div class="qsmall">нажми, чтобы прослушать ещё раз</div>
      <button class="btn sm" style="margin-top:12px;display:inline-flex" onclick="speak('${esc(cur.t.ex)}',0.85)">🎬 Услышать в примере</button>

    <div id="opts" class="optgrid">${opts.map((o,k)=>optRow(o,k,`pickListen(this,'${esc(o)}')`)).join("")}</div>`;

}
function pickListen(btn,val){
  if(listen.locked) return; listen.locked=true;
  const cur=listen.list[listen.i]; const correct=decode(val)===cur.t.ru;
  markOpts(btn,cur.t.ru,correct);
  if(correct){ listen.score++; bump(itemId(listen.mid,cur.i),true); registerStudy(10); sfx('good'); haptic(8); }
  else{ bump(itemId(listen.mid,cur.i),false); registerStudy(3); sfx('bad'); haptic(40); }
  const w=document.createElement("div"); w.className="mut small"; w.style.textAlign="center"; w.style.marginTop="10px";
  w.innerHTML=`Это было: <b style="color:var(--txt)">${cur.t.en}</b>`;
  document.getElementById("opts").appendChild(w);
  setTimeout(()=>{ listen.i++; drawListen(); window.scrollTo(0,0); }, 1350);
}
function listenDone(m){
  const pct=Math.round(listen.score/listen.list.length*100);
  if(pct>=80) confetti();
  app.innerHTML=`<div class="wrap fade"><div class="result">
    <div class="em">${pct>=80?"🎧✨":"🎧"}</div>
    <div class="rt">${listen.score} из ${listen.list.length} на слух</div>

}

/* ---------- MATCHING GAME (Пары) ---------- */
let match=null;
function renderMatch(id){
  const m=moduleById(id);
  const pick=shuffle(m.terms.map((t,i)=>({t,i}))).slice(0,6);
  const tiles=[];
  pick.forEach(({t,i},k)=>{ tiles.push({pid:k,ti:i,txt:t.en,en:true}); tiles.push({pid:k,ti:i,txt:t.ru,en:false}); });
  shuffle(tiles);
  match={mid:id,tiles,sel:null,wrong:null,done:0,moves:0,start:Date.now()};
  drawMatch();
}
function drawMatch(){
  const m=moduleById(match.mid); const color=m.color||'#6ea8fe';
  const grid=match.tiles.map((tile,idx)=>{
    let st="margin:0;min-height:64px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px;line-height:1.25;animation-delay:"+(idx*45)+"ms;";
    if(tile.en) st+="font-weight:800;color:var(--theme);";
    if(tile.matched) st+="opacity:.22;border-color:var(--good);background:rgba(52,211,153,.12);";
    else if(match.sel===idx) st+="border-color:var(--theme);background:color-mix(in srgb,var(--theme) 22%,transparent);transform:scale(.97);";
    else if(match.wrong&&match.wrong.indexOf(idx)>=0) st+="border-color:var(--bad);background:rgba(251,113,133,.18);";
    return `<button class="opt" style="${st}" ${tile.matched?'disabled':''} onclick="tapTile(${idx})">${tile.txt}</button>`;
  }).join("");
  const pct=Math.round(match.done/6*100);
  app.innerHTML=`<div class="wrap fade game" style="--theme:${color}">
    <div class="gtop"><button class="back" onclick="go('subject','${match.mid}')">←</button>
      <div class="gbar"><i style="width:${pct}%"></i></div>
      <span class="count2">${match.done}<span>/6</span></span></div>
    <div class="gsub"><span class="subjchip">${m.ic} ${m.name}</span>
      <span class="qtype" style="margin:0 0 0 8px">🧩 Найди пары</span></div>
    <div class="mut small" style="margin:10px 2px 12px">Соедини английское слово с переводом.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${grid}</div>
  </div>`;
}
function tapTile(idx){
  if(match.wrong) return;
  const tile=match.tiles[idx]; if(tile.matched) return;
  if(match.sel===null){ match.sel=idx; sfx('tick'); drawMatch(); return; }
  if(match.sel===idx){ match.sel=null; drawMatch(); return; }
  const a=match.tiles[match.sel], b=tile; match.moves++;
  if(a.pid===b.pid && a.en!==b.en){
    a.matched=b.matched=true; match.done++; match.sel=null; sfx('good'); haptic(8);
    registerStudy(6); bump(itemId(match.mid,a.ti),true);
    const en=match.tiles.find(x=>x.pid===a.pid&&x.en); speak(moduleById(match.mid).terms[a.ti].en);
    drawMatch();
    if(match.done>=6) setTimeout(matchDone,450);
  } else {
    sfx('bad'); haptic(30); match.wrong=[match.sel,idx]; match.sel=null; drawMatch();
    setTimeout(()=>{ match.wrong=null; drawMatch(); },650);
  }
}
function matchDone(){
  confetti(); sfx('win');
  const secs=Math.round((Date.now()-match.start)/1000);
  app.innerHTML=`<div class="wrap fade"><div class="empty">
    <div style="font-size:54px">🧩</div>
    <h2 style="margin:10px 0">Все пары найдены!</h2>
    <div class="mut">Время ${secs} сек · ходов ${match.moves}</div>
    <button class="btn acc full" style="margin-top:14px" onclick="go('match','${match.mid}')">🔁 Ещё раз</button>
    <button class="btn full" style="margin-top:10px" onclick="go('subject','${match.mid}')">← К разделу</button>
  </div></div>`;
}

  } else {

      <div class="grow"><b>Тренажёр грамматики</b><div class="mut small">${GRAMMAR.practice.length} заданий с выбором ответа и объяснением каждой ошибки.</div></div></div>
      <button class="btn acc full" style="margin-top:14px" onclick="go('gpractice')">Начать практику →</button></div>

  }
  app.innerHTML=`<div class="wrap fade" style="--theme:#fbbf24">

/* grammar practice trainer */
let gprac={list:[],i:0,score:0,locked:false};
function renderGPractice(){
  const pool=GRAMMAR.practice.slice(); shuffle(pool);
  gprac={list:pool,i:0,score:0,locked:false};
  drawGPractice();
}
function drawGPractice(){
  if(gprac.i>=gprac.list.length) return gpracDone();
  const cur=gprac.list[gprac.i];
  const opts=cur.options.slice(); shuffle(opts);
  gprac.locked=false;
  const pct=Math.round(gprac.i/gprac.list.length*100);
  app.innerHTML=`<div class="wrap fade game" style="--theme:#fbbf24">
    ${gameTop('🎯 Практика грамматики',pct,{back:`go('grammar')`,i:gprac.i+1,n:gprac.list.length})}
    <div class="qcard"><div class="qtype">🎯 Выбери правильный вариант</div>
      <div class="qbig">${cur.q}</div></div>
    <div id="opts" class="optgrid">${opts.map((o,k)=>optRow(o,k,`pickGP(this,'${esc(o)}')`)).join("")}</div>`;
}
function pickGP(btn,val){
  if(gprac.locked) return; gprac.locked=true;
  const cur=gprac.list[gprac.i]; const correct=decode(val)===cur.answer;
  markOpts(btn,cur.answer,correct);
  if(correct){ gprac.score++; registerStudy(10); sfx('good'); haptic(8); }
  else { registerStudy(3); sfx('bad'); haptic(40); }
  const box=document.getElementById('opts');
  const ex=document.createElement('div'); ex.className='fbcard '+(correct?'ok':'no');
  ex.innerHTML=`<div class="head">${correct?'<span class="ok">✓ Верно</span>':'<span class="ko">✗ Объяснение</span>'}</div><div style="margin-top:6px;line-height:1.5">${cur.explain}</div>`;
  box.appendChild(ex);
  const nx=document.createElement('button'); nx.className='btn acc full'; nx.style.marginTop='12px';
  nx.textContent=(gprac.i+1>=gprac.list.length)?'Результат →':'Дальше →';
  nx.onclick=()=>{ gprac.i++; drawGPractice(); window.scrollTo(0,0); };
  box.appendChild(nx);
}
function gpracDone(){
  const pct=Math.round(gprac.score/gprac.list.length*100);
  if(pct>=80) confetti();
  app.innerHTML=`<div class="wrap fade"><div class="result">
    <div class="em">${pct>=80?'🏆':pct>=50?'👍':'💪'}</div>
    <div class="rt">${gprac.score} из ${gprac.list.length}</div>
    <div class="mut">${pct>=80?'Отличная грамматика!':'Перечитай уроки и попробуй снова.'}</div>
    <button class="btn acc full" style="margin-top:18px" onclick="go('gpractice')">🔁 Ещё раз</button>
    <button class="btn full" style="margin-top:10px" onclick="go('grammar')">← К грамматике</button>
  </div></div>`;
}

/* ---------- PROGRESS ---------- */

    return `<div class="trow" style="--theme:${color}">

      <div class="grow">
        <div class="between"><b style="font-size:14.5px">${m.name}</b><span class="mut small">${p.learned}/${p.total} · ${p.pct}%</span></div>

    </div>

    <div class="secttl">🎧 Звук и голос</div>
    <div class="panel">
      <div class="between"><b>Голос озвучки</b>
        <button class="iconbtn" onclick="speak('Hello! This is the voice for listening.')">🔊</button></div>
      <div style="margin-top:10px">
        ${(()=>{ const vs=enVoices();
          if(!vs.length) return '<div class="mut small">Голоса ещё загружаются…</div><button class="btn sm full" style="margin-top:8px" onclick="loadVoices();renderProgress()">🔄 Обновить</button>';
          const opts='<option value="">Авто (лучший доступный)</option>'+vs.map(v=>`<option value="${v.name.replace(/"/g,'&quot;')}" ${S.voiceName===v.name?'selected':''}>${v.name}${/en[-_]GB/i.test(v.lang)?' · UK':''}</option>`).join('');
          return `<select onchange="setVoice(this.value)" style="width:100%;padding:13px;border-radius:13px;border:1px solid var(--glassb);background:var(--card2);color:var(--txt);font-size:15px;font-weight:700">${opts}</select>`; })()}
      </div>
      <div class="between" style="margin-top:14px"><b>Скорость</b><span class="mut small">${(S.rate||0.95).toFixed(2)}×</span></div>
      <div class="seg" style="margin-top:8px">
        <button class="${(S.rate||0.95)<0.9?'on':''}" onclick="setRate(0.8)">🐢 Медленно</button>
        <button class="${(S.rate||0.95)>=0.9&&(S.rate||0.95)<=1.0?'on':''}" onclick="setRate(0.95)">Норма</button>
        <button class="${(S.rate||0.95)>1.0?'on':''}" onclick="setRate(1.1)">🐇 Быстро</button>
      </div>
      <button class="btn full" style="margin-top:14px" onclick="toggleSound()">${S.sound===false?'🔇 Звуки игры: выкл':'🔊 Звуки игры: вкл'}</button>

    <div class="secttl">По предметам</div>
    ${rows}

      <div class="mut small">Хочешь начать заново?</div>

    </div>
    <div style="height:10px"></div>
  </div>`;
}
function resetAll(){
  if(confirm("Сбросить весь прогресс, серию и XP? (настройки голоса сохранятся)")){
    S={ xp:0, streak:0, lastDay:null, todayCount:0, todayDay:null, mastery:{}, voiceName:S.voiceName, rate:S.rate, sound:S.sound };
    save(); toast("Прогресс сброшен"); go("home");
  }
}
function setVoice(name){ S.voiceName=name||null; save(); speak('Great choice. This is your listening voice.'); }
function setRate(r){ S.rate=parseFloat(r); save(); renderProgress(); speak('Listen to the new speed.'); }
function toggleSound(){ S.sound=(S.sound===false); save(); if(S.sound) sfx('good'); renderProgress(); }

/* =========================================================================
   UTIL
   ========================================================================= */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return String(s)
  .replace(/&/g,"&amp;").replace(/"/g,"&quot;")
  .replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g," "); }
function decode(s){ return String(s).replace(/\\'/g,"'").replace(/\\\\/g,"\\"); }

function confetti(){
  const c=document.createElement("div"); c.className="conf"; document.body.appendChild(c);
  const colors=["#6ea8fe","#8b7bff","#34d399","#fbbf24","#fb7185"];
  for(let i=0;i<70;i++){
    const p=document.createElement("div");
    const s=6+Math.random()*8;
    p.style.cssText=`position:absolute;top:-20px;left:${Math.random()*100}%;width:${s}px;height:${s}px;
      background:${colors[i%colors.length]};border-radius:${Math.random()<.5?'50%':'2px'};
      opacity:.9;transform:rotate(${Math.random()*360}deg)`;
    c.appendChild(p);
    const dur=1400+Math.random()*1200;
    p.animate([{transform:`translateY(0) rotate(0)`},{transform:`translateY(110vh) rotate(${720*(Math.random()<.5?1:-1)}deg)`}],
      {duration:dur,easing:"cubic-bezier(.2,.6,.4,1)"});
    setTimeout(()=>p.remove(),dur);
  }
  setTimeout(()=>c.remove(),2800);
}

/* init: unlock speech on first interaction (iOS) */
function unlockAudio(){
  try{ const u=new SpeechSynthesisUtterance(" "); u.volume=0; speechSynthesis.speak(u); }catch(e){}
  try{ audioCtx(); }catch(e){}
}
document.body.addEventListener("touchstart",unlockAudio,{once:true});
document.body.addEventListener("mousedown",unlockAudio,{once:true});

render();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
