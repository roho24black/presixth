<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pre-Sixth">
<meta name="theme-color" content="#0b1020">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Pre-Sixth Prep · KESW</title>
<style>
  :root{
    --bg:#070b16; --bg2:#0e1426; --card:#141d36; --card2:#1a2444;
    --line:#2a3a63; --txt:#eef2ff; --mut:#9fb0d8; --mut2:#6f7fab;
    --acc:#6ea8fe; --acc2:#a78bfa; --acc3:#fb7bb5; --acc4:#34e0c8;
    --good:#34d399; --bad:#fb7185; --warn:#fbbf24;
    --glass:rgba(22,31,58,.62); --glassb:rgba(150,170,230,.16);
    --r:20px; --shadow:0 12px 34px rgba(0,0,0,.42);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    overscroll-behavior-y:none;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;position:relative;
    padding:env(safe-area-inset-top) 0 calc(104px + env(safe-area-inset-bottom));background:var(--bg)}
  body::before{content:"";position:fixed;inset:-20% -10% auto -10%;height:72vh;z-index:-1;pointer-events:none;
    background:
      radial-gradient(45% 50% at 16% 6%, rgba(110,168,254,.32), transparent 70%),
      radial-gradient(45% 50% at 86% 0%, rgba(167,139,250,.30), transparent 70%),
      radial-gradient(40% 45% at 60% 32%, rgba(251,123,181,.16), transparent 70%)}
  .wrap{max-width:560px;margin:0 auto;padding:14px}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em}
  .mut{color:var(--mut)} .small{font-size:13px}
  .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .grow{flex:1}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  .hidden{display:none!important}

  /* top */
  .top{padding:10px 2px 4px}
  .brand{font-size:12px;color:var(--mut);letter-spacing:.2em;text-transform:uppercase;font-weight:800}
  .hi{font-size:27px;margin-top:4px;font-weight:800;letter-spacing:-.03em}

  /* chips / stat */
  .stats{display:flex;gap:10px;margin-top:16px}
  .stat{flex:1;background:var(--glass);border:1px solid var(--glassb);border-radius:var(--r);padding:13px 12px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .stat b{font-size:23px;display:block;line-height:1.1;font-weight:800}
  .stat span{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}

  .panel{background:var(--glass);border:1px solid var(--glassb);border-radius:var(--r);padding:17px;margin-top:14px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:var(--shadow)}

  /* ring */
  .ring{display:flex;align-items:center;gap:14px}
  .ringsvg{width:64px;height:64px;flex:none}
  .ringsvg circle{fill:none;stroke-width:7;stroke-linecap:round}
  .ringbg{stroke:rgba(150,170,230,.16)}
  .ringfg{stroke:url(#g);transition:stroke-dashoffset .6s ease}

  /* countdown */
  .count{display:flex;gap:8px;margin-top:12px}
  .count div{flex:1;background:rgba(8,12,24,.5);border:1px solid var(--glassb);border-radius:14px;padding:11px 6px;text-align:center}
  .count b{font-size:21px;display:block;font-weight:800}
  .count span{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}

  /* subject grid */
  .secttl{margin:22px 2px 10px;font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.12em;font-weight:800}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .subj{position:relative;border:1px solid var(--glassb);border-radius:var(--r);padding:15px;
    background:var(--glass);overflow:hidden;text-align:left;transition:transform .14s;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .subj:active{transform:scale(.96)}
  .subj .ic{font-size:23px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;
    border-radius:14px;background:rgba(255,255,255,.06);border:1px solid var(--glassb)}
  .subj h3{font-size:16px;margin-top:11px;font-weight:800}
  .subj .ex{font-size:11px;color:var(--mut2);margin-top:2px}
  .subj .bar{height:6px;border-radius:6px;background:rgba(8,12,24,.6);margin-top:13px;overflow:hidden}
  .subj .bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
  .subj .pc{font-size:11px;color:var(--mut);margin-top:7px;display:flex;justify-content:space-between;font-weight:600}
  .glow{position:absolute;inset:0;opacity:.20;pointer-events:none}

  /* generic card / list */
  .item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--glassb);
    border-radius:16px;background:var(--glass);margin-bottom:10px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}

  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:16px;
    font-weight:800;font-size:15px;background:rgba(255,255,255,.05);border:1px solid var(--glassb);color:var(--txt)}
  .btn.acc{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#0a0f1f;
    box-shadow:0 10px 24px rgba(122,150,255,.34)}
  .btn.full{width:100%}
  .btn:active{transform:scale(.985);filter:brightness(.97)}
  .btn.sm{padding:10px 12px;font-size:13px;border-radius:12px}
  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}

  /* flashcard */
  .deckwrap{margin-top:10px}
  .fcard{position:relative;height:360px;border-radius:24px}
  .face{position:absolute;top:0;left:0;width:100%;height:100%;
    border:1px solid var(--glassb);border-radius:24px;padding:24px;display:flex;flex-direction:column;
    justify-content:center;align-items:center;text-align:center;
    background:linear-gradient(160deg,rgba(36,48,86,.92),rgba(16,22,42,.94));box-shadow:var(--shadow);
    opacity:0;visibility:hidden;transform:scale(.96);transition:opacity .28s ease, transform .28s ease}
  .face.front{opacity:1;visibility:visible;transform:none}
  .fcard.flip .face.front{opacity:0;visibility:hidden;transform:scale(.96)}
  .fcard.flip .face.rear{opacity:1;visibility:visible;transform:none}
  .face.rear{justify-content:flex-start;align-items:flex-start;text-align:left;overflow:auto}
  .term{font-size:31px;font-weight:800;letter-spacing:-.02em}
  .ipa{color:var(--mut);margin-top:6px;font-size:14px}
  .tap{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:var(--mut2);font-size:12px}
  .speaker{margin-top:18px;width:66px;height:66px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:26px;background:rgba(255,255,255,.06);border:1px solid var(--glassb)}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--acc);font-weight:800;margin:14px 0 4px}
  .ru{font-size:23px;font-weight:800}
  .def{margin-top:2px;color:var(--txt);line-height:1.45}
  .ex{color:var(--mut);font-style:italic;line-height:1.5;margin-top:2px}
  .progressline{height:7px;background:rgba(8,12,24,.6);border-radius:7px;overflow:hidden;margin:6px 0 12px}
  .progressline i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .3s}

  /* quiz */
  .opt{padding:15px 16px;border:1px solid var(--glassb);border-radius:15px;background:var(--glass);
    margin-bottom:10px;font-size:16px;font-weight:700;transition:.15s;text-align:left;width:100%;color:var(--txt);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .opt:active{transform:scale(.99)}
  .opt.correct{background:rgba(52,211,153,.18);border-color:var(--good)}
  .opt.wrong{background:rgba(251,113,133,.16);border-color:var(--bad)}
  .opt.dim{opacity:.45}
  .qhead{font-size:13px;color:var(--mut);margin-bottom:6px}
  .qprompt{font-size:25px;font-weight:800;margin:4px 0 18px;line-height:1.25}

  /* bottom nav — floating pill */
  .nav{position:fixed;left:12px;right:12px;bottom:calc(8px + env(safe-area-inset-bottom));z-index:50;
    background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
    border:1px solid var(--glassb);border-radius:24px;box-shadow:var(--shadow);padding:6px}
  .navin{max-width:540px;margin:0 auto;display:flex;gap:4px}
  .nav button{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10px;color:var(--mut2);padding:9px 4px;border-radius:17px;transition:.2s;font-weight:700}
  .nav button .ni{font-size:20px}
  .nav button.on{color:#fff;background:linear-gradient(135deg,rgba(110,168,254,.24),rgba(167,139,250,.24))}

  .iconbtn{width:42px;height:42px;border-radius:13px;background:rgba(255,255,255,.06);border:1px solid var(--glassb);
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:rgba(14,20,38,.95);border:1px solid var(--glassb);padding:11px 18px;border-radius:999px;font-size:13px;
    transition:.25s;z-index:80;pointer-events:none;font-weight:700;backdrop-filter:blur(10px)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .pill{display:inline-flex;gap:6px;align-items:center;font-size:12px;color:var(--mut);
    background:rgba(8,12,24,.5);border:1px solid var(--glassb);padding:5px 11px;border-radius:999px;font-weight:600}
  .empty{text-align:center;color:var(--mut);padding:38px 20px}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .back{font-size:21px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;
    border-radius:13px;background:rgba(255,255,255,.06);border:1px solid var(--glassb);flex:none}
  .seg{display:flex;background:rgba(8,12,24,.5);border:1px solid var(--glassb);border-radius:14px;padding:4px;gap:4px;margin-top:12px}
  .seg button{flex:1;padding:10px;border-radius:11px;font-size:13px;font-weight:800;color:var(--mut);background:none}
  .seg button.on{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0a0f1f}
  .tag{font-size:11px;color:var(--mut);background:rgba(8,12,24,.5);border:1px solid var(--glassb);
    padding:5px 10px;border-radius:999px;margin:0 6px 6px 0;display:inline-block;font-weight:600}
  .ok{color:var(--good)} .ko{color:var(--bad)}
  .fade{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .conf{position:fixed;inset:0;pointer-events:none;z-index:90}

  /* hero (home) */
  .hero{position:relative;overflow:hidden;border-radius:24px;padding:18px;margin-top:16px;
    background:linear-gradient(135deg,rgba(110,168,254,.22),rgba(167,139,250,.18),rgba(251,123,181,.12));
    border:1px solid var(--glassb);box-shadow:var(--shadow)}

  /* quick links (home) */
  .qrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .ql{position:relative;overflow:hidden;text-align:left;border-radius:18px;padding:15px;border:1px solid var(--glassb);
    background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:transform .14s}
  .ql:active{transform:scale(.96)}
  .ql .ic{font-size:24px}
  .ql b{display:block;margin-top:8px;font-size:15px;font-weight:800}
  .ql span{font-size:11.5px;color:var(--mut)}

  /* grammar lessons */
  .lesson h3{font-size:16px;font-weight:800}
  .lessonbody{line-height:1.6;color:var(--txt)}
  .lessonbody p{margin:0 0 10px}
  .exline{padding:11px 13px;border-radius:13px;background:rgba(8,12,24,.4);border:1px solid var(--glassb);margin-bottom:8px}
  .exline .en{font-weight:700}
  .exline .ru{font-size:13px;font-weight:500;color:var(--mut);margin-top:2px}
  .callout{border-radius:14px;padding:13px 14px;margin-top:12px;border:1px solid var(--glassb);background:rgba(52,211,153,.12)}
  .callout.bad{background:rgba(251,113,133,.12)}
  .callout b{display:block;margin-bottom:5px}

  /* essay phrases / slang */
  .pgroup{font-size:12px;color:var(--acc);text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin:18px 2px 8px}
  .reg{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:3px 8px;border-radius:999px;border:1px solid var(--glassb);white-space:nowrap}
  .reg.uk{color:#7ee0ff;background:rgba(80,200,255,.12)}
  .reg.txt{color:#ffd27e;background:rgba(255,200,90,.12)}
  .reg.gen{color:#c8b3ff;background:rgba(167,139,250,.16)}
</style>
</head>
<body>
<div id="app"></div>

<nav class="nav">
  <div class="navin">
    <button data-nav="home" class="on"><span class="ni">🏠</span>Главная</button>
    <button data-nav="subjects"><span class="ni">📚</span>Учить</button>
    <button data-nav="grammar"><span class="ni">✍️</span>Грамматика</button>
    <button data-nav="progress"><span class="ni">📈</span>Прогресс</button>
  </div>
</nav>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   DATA — KESW Pre-Sixth (Year 11) survival vocabulary
   en = английский термин/фраза · ru = перевод · def = простое объяснение
   ex = пример в контексте (как это звучит на уроке)
   ========================================================================= */
const DATA = {
  classroom: {
    id:"classroom", name:"Язык урока", nameEn:"Classroom English", ic:"🗣️",
    exam:"Что реально говорит учитель",
    desc:"Фразы, которыми учителя дают инструкции, объясняют и проверяют, поняли ли вы. Это самое важное — выучи в первую очередь.",
    topics:["Инструкции","Объяснение","Проверка понимания","Учёба и оценки"],
    terms:[
      {en:"Turn to page 42",ru:"Откройте страницу 42",def:"Учитель просит открыть учебник на нужной странице.",ex:"Right everyone, turn to page 42 and look at the diagram."},
      {en:"Work in pairs",ru:"Работайте в парах",def:"Делать задание вдвоём с соседом.",ex:"Work in pairs and compare your answers."},
      {en:"Hand in your work",ru:"Сдайте работу",def:"Отдать выполненное задание учителю.",ex:"Please hand in your work by the end of the lesson."},
      {en:"Show your working",ru:"Покажите ход решения",def:"Записать все шаги, а не только ответ (важно в математике и науках).",ex:"You'll lose marks if you don't show your working."},
      {en:"Make a note of this",ru:"Запишите это",def:"Учитель просит записать важную информацию.",ex:"Make a note of this — it will come up in the exam."},
      {en:"Fill in the blanks",ru:"Заполните пропуски",def:"Вписать недостающие слова в задание.",ex:"Fill in the blanks using the words in the box."},
      {en:"Underline the key words",ru:"Подчеркните ключевые слова",def:"Выделить главные слова линией снизу.",ex:"Underline the key words in the question first."},
      {en:"Does that make sense?",ru:"Это понятно? / Логично?",def:"Учитель проверяет, поняли ли вы объяснение.",ex:"So we cancel the brackets — does that make sense?"},
      {en:"Are you with me?",ru:"Вы успеваете за мной?",def:"Проверка, не отстали ли вы.",ex:"We move x to the other side. Are you with me so far?"},
      {en:"In other words",ru:"Другими словами / То есть",def:"Учитель повторяет мысль проще.",ex:"It's elastic — in other words, demand changes a lot when the price changes."},
      {en:"Bear in mind",ru:"Имейте в виду",def:"Запомнить важную деталь.",ex:"Bear in mind that the units must be the same."},
      {en:"Let me give you an example",ru:"Давайте я приведу пример",def:"Учитель сейчас покажет конкретный случай.",ex:"Let me give you an example to make this clearer."},
      {en:"The key point is...",ru:"Главное — это...",def:"Сейчас прозвучит самое важное.",ex:"The key point is that energy is always conserved."},
      {en:"Could you repeat that?",ru:"Повторите, пожалуйста",def:"Вежливо попросить сказать ещё раз, если не расслышали.",ex:"Sorry, could you repeat that? I didn't catch the last part."},
      {en:"I'm not sure I follow",ru:"Я не совсем понял",def:"Вежливо сказать, что вы потеряли мысль.",ex:"I'm not sure I follow — could you explain the second step again?"},
      {en:"Could you clarify...?",ru:"Не могли бы вы уточнить...?",def:"Попросить объяснить непонятное место.",ex:"Could you clarify what you mean by 'net force'?"},
      {en:"Deadline / due date",ru:"Срок сдачи",def:"Последний день, когда можно сдать работу.",ex:"The deadline for the essay is Friday."},
      {en:"Homework / assignment",ru:"Домашнее задание",def:"Задание, которое делают дома.",ex:"For homework, finish the questions on page 50."},
      {en:"To revise",ru:"Повторять перед экзаменом",def:"В британском английском revise = готовиться к экзамену (НЕ «переписывать»).",ex:"Make sure you revise the whole topic for the test."},
      {en:"Mock exam",ru:"Пробный экзамен",def:"Тренировочный экзамен в условиях настоящего.",ex:"We have a mock exam after the half-term break."},
      {en:"Marks / grade",ru:"Баллы / оценка",def:"Marks — баллы за работу; grade — итоговая оценка (9–1).",ex:"You got 18 out of 20 marks — a really strong grade."},
      {en:"Feedback",ru:"Обратная связь / комментарии",def:"Что учитель написал о вашей работе и как её улучшить.",ex:"Read my feedback and act on it for next time."},
      {en:"Highlight",ru:"Выделить маркером",def:"Отметить текст цветом.",ex:"Highlight the words you don't understand."},
      {en:"Label the diagram",ru:"Подпишите схему",def:"Написать названия частей на рисунке.",ex:"Label the diagram of the heart with these terms."}
    ]
  },
  slang: {
    id:"slang", name:"Сленг", nameEn:"Slang & texting", ic:"💬",
    exam:"Для переписки с друзьями", color:"#fb7bb5",
    desc:"Неформальный английский, которым реально переписываются и общаются подростки в Британии. ⚠️ Это для друзей — НЕ для учителей, экзаменов и эссе.",
    topics:["Переписка","Британский сленг","Gen-Z"],
    terms:[
      {en:"lol",ru:"ха-ха / смешно",def:"💬 В переписке. «Laughing out loud» — реакция на что-то смешное.",ex:"lol that's actually so funny 😭"},
      {en:"tbh",ru:"честно говоря",def:"💬 «To be honest» — когда говоришь искреннее мнение.",ex:"tbh I didn't really like the film"},
      {en:"ngl",ru:"не вру / честно",def:"💬 «Not gonna lie» — признаёшь что-то честно.",ex:"ngl this homework is actually hard"},
      {en:"idk",ru:"не знаю",def:"💬 «I don't know».",ex:"idk what to wear tomorrow tbh"},
      {en:"imo",ru:"по-моему",def:"💬 «In my opinion».",ex:"imo the first option is way better"},
      {en:"rn",ru:"прямо сейчас",def:"💬 «Right now».",ex:"what are you doing rn?"},
      {en:"fr",ru:"реально / серьёзно",def:"💬 «For real» — соглашаешься или подчёркиваешь правду.",ex:"— that lesson was so long — fr 😩"},
      {en:"wyd",ru:"что делаешь?",def:"💬 «What you doing?» — частое начало переписки.",ex:"heyy wyd later?"},
      {en:"hbu / wbu",ru:"а ты? / а у тебя?",def:"💬 «How / what about you?» — возвращаешь вопрос.",ex:"I'm good thanks, hbu?"},
      {en:"btw",ru:"кстати",def:"💬 «By the way» — добавить мысль.",ex:"btw are you coming on Friday?"},
      {en:"brb",ru:"щас вернусь",def:"💬 «Be right back» — отойти на минуту.",ex:"brb, dinner's ready"},
      {en:"gtg",ru:"мне пора",def:"💬 «Got to go».",ex:"ok gtg, ttyl!"},
      {en:"ttyl",ru:"спишемся позже",def:"💬 «Talk to you later».",ex:"have fun! ttyl x"},
      {en:"omw",ru:"уже еду / иду",def:"💬 «On my way».",ex:"omw, like 5 mins"},
      {en:"nvm",ru:"забей / неважно",def:"💬 «Never mind».",ex:"nvm, I figured it out"},

function moduleById(id){ return MODULES.find(m=>m.id===id); }
function lessonById(id){ return GRAMMAR.lessons.find(l=>l.id===id); }
function itemId(mid,i){ return mid+"#"+i; }
const TOTAL_ITEMS = MODULES.reduce((a,m)=>a+m.terms.length,0);

/* =========================================================================
   STATE
   ========================================================================= */
const SKEY="presixth_v2";
let S = load();
function load(){
  try{ const r=JSON.parse(localStorage.getItem(SKEY)); if(r) return r; }catch(e){}
  return { xp:0, streak:0, lastDay:null, todayCount:0, todayDay:null, mastery:{}, voice:null };
}
function save(){ localStorage.setItem(SKEY, JSON.stringify(S)); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function rollDay(){
  const t=todayStr();
  if(S.todayDay!==t){ S.todayDay=t; S.todayCount=0; }
}
function registerStudy(n){
  rollDay();
  const t=todayStr();
  if(S.lastDay!==t){
    // streak logic
    const y=new Date(); y.setDate(y.getDate()-1);
    const ys=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
    S.streak = (S.lastDay===ys)? (S.streak+1) : 1;
    S.lastDay=t;
  }
  S.xp += n;
  save();
}
function masteryOf(id){ return S.mastery[id]||0; }   // 0..5
function bump(id, up){
  const cur=masteryOf(id);
  S.mastery[id] = up ? Math.min(5,cur+1) : 0;
  save();
}
function moduleProgress(m){
  let learned=0;
  m.terms.forEach((_,i)=>{ if(masteryOf(itemId(m.id,i))>=3) learned++; });
  return {learned, total:m.terms.length, pct: Math.round(learned/m.terms.length*100)};
}
function overallLearned(){
  let n=0;
  MODULES.forEach(m=>m.terms.forEach((_,i)=>{ if(masteryOf(itemId(m.id,i))>=3) n++; }));
  return n;
}
function levelInfo(){
  const lv = Math.floor(S.xp/200)+1;
  const into = S.xp%200;
  return { lv, into, pct: Math.round(into/200*100) };
}

/* =========================================================================
   SPEECH (British voice)
   ========================================================================= */
let VOICES=[];
function loadVoices(){ VOICES = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
function pickVoice(){
  if(!VOICES.length) loadVoices();
  return VOICES.find(v=>/en[-_]GB/i.test(v.lang)) ||
         VOICES.find(v=>/Daniel|Kate|Serena|Arthur|UK English/i.test(v.name)) ||
         VOICES.find(v=>/^en/i.test(v.lang)) || null;
}
function speak(text, rate){
  if(!window.speechSynthesis) { toast("🔇 Озвучка недоступна на этом устройстве"); return; }
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.replace(/[²³]/g," squared "));
    const v=pickVoice(); if(v) u.voice=v;
    u.lang="en-GB"; u.rate=rate||0.9; u.pitch=1;
    speechSynthesis.speak(u);
  }catch(e){}
}

}

    <circle class="ringbg" cx="31" cy="31" r="${r}"></circle>
    <circle class="ringfg" cx="31" cy="31" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 31 31)"></circle>
    <text x="31" y="36" text-anchor="middle" font-size="15" font-weight="800" fill="#eaf0ff">${pct}%</text>
  </svg>`;

/* ---------- QUIZ ---------- */
let quiz={list:[],i:0,score:0,mid:null,locked:false};
function renderQuiz(id){
  const m=moduleById(id);
  const pool=m.terms.map((t,i)=>({t,i}));
  shuffle(pool);
  quiz={list:pool.slice(0,Math.min(10,pool.length)),i:0,score:0,mid:id,locked:false};
  drawQuiz();
}
function drawQuiz(){
  const m=moduleById(quiz.mid);
  if(quiz.i>=quiz.list.length) return quizDone(m);
  const cur=quiz.list[quiz.i];
  const reverse = Math.random()<0.5; // sometimes EN->RU, sometimes RU->EN
  const prompt = reverse ? cur.t.ru : cur.t.en;
  const answer = reverse ? cur.t.en : cur.t.ru;
  // build options
  const others=m.terms.filter((_,i)=>i!==cur.i);
  shuffle(others);
  const opts=[answer, ...others.slice(0,3).map(o=>reverse?o.en:o.ru)];
  shuffle(opts);
  quiz._answer=answer; quiz._reverse=reverse; quiz.locked=false;
  const pct=Math.round(quiz.i/quiz.list.length*100);
  app.innerHTML=`<div class="wrap fade">
    <div class="topbar">
      <button class="back" onclick="go('subject','${m.id}')">←</button>
      <div class="grow"><div class="brand">Тест · ${m.name}</div>
        <div class="progressline" style="margin-top:6px"><i style="width:${pct}%"></i></div></div>
      <span class="pill">${quiz.i+1}/${quiz.list.length}</span>
    </div>
    <div class="panel" style="text-align:center">
      <div class="qhead">${reverse?"Как это по-английски?":"Что это значит?"}
        ${reverse?"":`<button class="iconbtn" style="display:inline-flex;vertical-align:middle" onclick="speak('${esc(cur.t.en)}')">🔊</button>`}</div>
      <div class="qprompt">${prompt}</div>
    </div>
    <div id="opts">
      ${opts.map(o=>`<button class="opt" onclick="pickOpt(this,'${esc(o)}')">${o}</button>`).join("")}
    </div>
    <div class="between mut small" style="margin-top:6px">
      <span>Очки: ${quiz.score}</span><span>🔥 ${S.streak} дней</span></div>
  </div>`;
}
function pickOpt(btn,val){
  if(quiz.locked) return; quiz.locked=true;
  const correct = decode(val)===quiz._answer;
  const cur=quiz.list[quiz.i];
  document.querySelectorAll("#opts .opt").forEach(b=>{
    const bv=b.textContent;
    if(bv===quiz._answer) b.classList.add("correct");
    else b.classList.add("dim");
  });
  if(correct){ btn.classList.add("correct"); quiz.score++; bump(itemId(quiz.mid,cur.i),true); registerStudy(10); }
  else { btn.classList.remove("dim"); btn.classList.add("wrong"); bump(itemId(quiz.mid,cur.i),false); registerStudy(3);
    if(!quiz._reverse) speak(cur.t.en); }
  setTimeout(()=>{ quiz.i++; drawQuiz(); }, correct?650:1400);
}
function quizDone(m){
  const pct=Math.round(quiz.score/quiz.list.length*100);
  if(pct>=80) confetti();
  app.innerHTML=`<div class="wrap fade"><div class="empty">
    <div style="font-size:54px">${pct>=80?"🏆":pct>=50?"👍":"💪"}</div>
    <h2 style="margin:10px 0">${quiz.score} из ${quiz.list.length} верно</h2>
    <div class="mut">${pct>=80?"Отличный результат!":pct>=50?"Хорошо, но повтори слабые слова.":"Прогоним карточки ещё раз?"}</div>
    <button class="btn acc full" style="margin-top:14px" onclick="go('study','${m.id}')">🃏 Учить карточки</button>
    <button class="btn full" style="margin-top:10px" onclick="go('quiz','${m.id}')">🔁 Ещё тест</button>
    <button class="btn full" style="margin-top:10px" onclick="go('subject','${m.id}')">← К предмету</button>
  </div></div>`;
}

  </div>`;

function flipMix(){ study.flip=!study.flip; const c=document.getElementById("fcard"); if(c)c.classList.toggle("flip",study.flip); }
function answerMix(known){
  const cur=study.list[study.i];
  bump(itemId(cur._m,cur.i),known);
  registerStudy(known?5:2);
  study.i++; study.flip=false; drawMix();
}
function mixDone(){
  confetti();
  const goalPct=Math.min(100,Math.round(S.todayCount/DAILY_GOAL*100));
  app.innerHTML=`<div class="wrap fade"><div class="empty">
    <div style="font-size:54px">${goalPct>=100?"🏅":"⚡️"}</div>
    <h2 style="margin:10px 0">Тренировка завершена!</h2>
    <div class="mut">Сегодня пройдено ${S.todayCount} карточек · 🔥 ${S.streak} дней подряд</div>
    <div class="panel">${ringSvgRow(goalPct)}</div>
    <button class="btn acc full" onclick="go('daily')">🔁 Ещё раунд</button>
    <button class="btn full" style="margin-top:10px" onclick="go('home')">🏠 На главную</button>
  </div></div>`;
}
function ringSvgRow(pct){
  return `<div class="ring">${ringSvg(pct)}<div class="grow" style="text-align:left">
    <b>Цель дня ${pct>=100?"выполнена 🎉":""}</b>

/* ---------- GRAMMAR ---------- */
let grammarTab="lessons";
function setGrammarTab(t){ grammarTab=t; renderGrammar(); window.scrollTo(0,0); }
function renderGrammar(){
  const seg=`<div class="seg">
    <button class="${grammarTab==='lessons'?'on':''}" onclick="setGrammarTab('lessons')">📘 Уроки</button>
    <button class="${grammarTab==='phrases'?'on':''}" onclick="setGrammarTab('phrases')">🧩 Фразы</button>
    <button class="${grammarTab==='practice'?'on':''}" onclick="setGrammarTab('practice')">🎯 Практика</button>
  </div>`;
  let body="";
  if(grammarTab==='lessons'){
    body=`<div class="mut small" style="margin:14px 2px 4px">Короткие уроки с правилами, примерами и разбором частых ошибок русскоговорящих.</div>`+
      GRAMMAR.lessons.map(l=>`<div class="panel" style="cursor:pointer" onclick="go('lesson','${l.id}')">
        <div class="row"><div class="ic" style="font-size:24px">${l.ic}</div>
        <div class="grow"><h3>${l.title}</h3><div class="mut small">${l.summary}</div></div>
        <span class="mut" style="font-size:20px">›</span></div></div>`).join("");
  } else if(grammarTab==='phrases'){
    const m=GRAMMAR.essay; const groups={};
    m.terms.forEach((t,i)=>{ (groups[t.group]=groups[t.group]||[]).push(t); });
    const list=Object.keys(groups).map(g=>`<div class="pgroup">${g}</div>`+
      groups[g].map(t=>`<div class="item">
        <button class="iconbtn" onclick="speak('${esc(t.en)}')">🔊</button>
        <div class="grow"><b>${t.en}</b><div class="mut small">${t.ru}</div></div>
      </div>`).join("")).join("");
    body=`<div class="panel" style="margin-top:14px"><div class="mut" style="line-height:1.5">Готовые академические фразы, чтобы эссе звучало уверенно. Выучи карточками или пройди тест.</div>
      <div class="actions" style="grid-template-columns:1fr 1fr;margin-top:12px">
        <button class="btn acc" onclick="go('study','essay')">🃏 Карточки</button>
        <button class="btn" onclick="go('quiz','essay')">✍️ Тест</button>
      </div></div>${list}`;
  } else {
    body=`<div class="panel" style="margin-top:14px"><div class="row"><div class="ic" style="font-size:26px">🎯</div>
      <div class="grow"><b>Тренажёр грамматики</b><div class="mut small">${GRAMMAR.practice.length} заданий с выбором ответа и объяснением каждой ошибки.</div></div></div>
      <button class="btn acc full" style="margin-top:14px" onclick="go('gpractice')">Начать практику →</button></div>
      <div class="mut small" style="text-align:center;margin-top:12px">Артикли · времена · пассив · условные · пунктуация · частые ошибки</div>`;
  }
  app.innerHTML=`<div class="wrap fade">
    <div class="top"><div class="brand">Писать эссе на английском</div><div class="hi">✍️ Грамматика</div></div>
    ${seg}
    <div>${body}</div>
  </div>`;
}

function renderLesson(id){
  const l=lessonById(id);
  const rule=l.rule.split("\n").map(p=>p.trim()===""?"":`<p>${p}</p>`).join("");
  const ex=l.examples.map(e=>`<div class="exline"><div class="en">${e.en}</div><div class="ru">${e.ru}</div></div>`).join("");
  const mistake=l.mistake?`<div class="callout bad"><b>⚠️ Частая ошибка</b>
    <div class="ko" style="text-decoration:line-through">${l.mistake.wrong}</div>
    <div class="ok" style="margin-top:5px">✓ ${l.mistake.right}</div>
    <div class="mut small" style="margin-top:7px">${l.mistake.why}</div></div>`:"";
  app.innerHTML=`<div class="wrap fade">
    <div class="topbar"><button class="back" onclick="go('grammar')">←</button>
      <div><div class="brand">Грамматика</div><h2 style="font-size:21px">${l.ic} ${l.title}</h2></div></div>
    <div class="panel"><div class="lessonbody">${rule}</div></div>
    <div class="secttl">Примеры</div>
    ${ex}
    ${mistake}
    <button class="btn acc full" style="margin-top:16px" onclick="go('gpractice')">🎯 Проверить себя</button>
  </div>`;
}

/* grammar practice trainer */
let gprac={list:[],i:0,score:0,locked:false};
function renderGPractice(){
  const pool=GRAMMAR.practice.slice(); shuffle(pool);
  gprac={list:pool,i:0,score:0,locked:false};
  drawGPractice();
}
function drawGPractice(){
  if(gprac.i>=gprac.list.length) return gpracDone();
  const cur=gprac.list[gprac.i];
  const opts=cur.options.slice(); shuffle(opts);
  gprac.locked=false;
  const pct=Math.round(gprac.i/gprac.list.length*100);
  app.innerHTML=`<div class="wrap fade">
    <div class="topbar"><button class="back" onclick="go('grammar')">←</button>
      <div class="grow"><div class="brand">Практика грамматики</div>
        <div class="progressline" style="margin-top:6px"><i style="width:${pct}%"></i></div></div>
      <span class="pill">${gprac.i+1}/${gprac.list.length}</span></div>
    <div class="panel" style="text-align:center"><div class="qhead">Выбери правильный вариант</div>
      <div class="qprompt">${cur.q}</div></div>
    <div id="opts">${opts.map(o=>`<button class="opt" onclick="pickGP(this,'${esc(o)}')">${o}</button>`).join("")}</div>
    <div class="between mut small" style="margin-top:6px"><span>Очки: ${gprac.score}</span><span>🔥 ${S.streak} дней</span></div>
  </div>`;
}
function pickGP(btn,val){
  if(gprac.locked) return; gprac.locked=true;
  const cur=gprac.list[gprac.i];
  const correct=decode(val)===cur.answer;
  document.querySelectorAll('#opts .opt').forEach(b=>{ if(b.textContent===cur.answer) b.classList.add('correct'); else b.classList.add('dim'); });
  if(correct){ btn.classList.add('correct'); gprac.score++; registerStudy(10); }
  else { btn.classList.remove('dim'); btn.classList.add('wrong'); registerStudy(3); }
  const box=document.getElementById('opts');
  const ex=document.createElement('div'); ex.className='callout'+(correct?'':' bad');
  ex.innerHTML=`<b>${correct?'✓ Верно':'✗ Объяснение'}</b>${cur.explain}`;
  box.appendChild(ex);
  const nx=document.createElement('button'); nx.className='btn acc full'; nx.style.marginTop='12px';
  nx.textContent=(gprac.i+1>=gprac.list.length)?'Результат →':'Дальше →';
  nx.onclick=()=>{ gprac.i++; drawGPractice(); window.scrollTo(0,0); };
  box.appendChild(nx);
}
function gpracDone(){
  const pct=Math.round(gprac.score/gprac.list.length*100);
  if(pct>=80) confetti();
  app.innerHTML=`<div class="wrap fade"><div class="empty">
    <div style="font-size:54px">${pct>=80?'🏆':pct>=50?'👍':'💪'}</div>
    <h2 style="margin:10px 0">${gprac.score} из ${gprac.list.length}</h2>
    <div class="mut">${pct>=80?'Отличная грамматика!':'Перечитай уроки и попробуй снова.'}</div>
    <button class="btn acc full" style="margin-top:14px" onclick="go('gpractice')">🔁 Ещё раз</button>
    <button class="btn full" style="margin-top:10px" onclick="go('grammar')">← К грамматике</button>
  </div></div>`;
}

      <div class="stat"><b>${S.streak}🔥</b><span>серия</span></div>

    ${rows}
    <div class="panel" style="text-align:center">
      <div class="mut small">Хочешь начать заново?</div>
      <button class="btn full" style="margin-top:10px" onclick="resetAll()">♻️ Сбросить прогресс</button>

function resetAll(){
  if(confirm("Сбросить весь прогресс, серию и XP?")){

    save(); toast("Прогресс сброшен"); go("home");

}

/* =========================================================================
   UTIL
   ========================================================================= */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return String(s)
  .replace(/&/g,"&amp;").replace(/"/g,"&quot;")
  .replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g," "); }
function decode(s){ return String(s).replace(/\\'/g,"'").replace(/\\\\/g,"\\"); }

function confetti(){
  const c=document.createElement("div"); c.className="conf"; document.body.appendChild(c);
  const colors=["#6ea8fe","#8b7bff","#34d399","#fbbf24","#fb7185"];
  for(let i=0;i<70;i++){
    const p=document.createElement("div");
    const s=6+Math.random()*8;
    p.style.cssText=`position:absolute;top:-20px;left:${Math.random()*100}%;width:${s}px;height:${s}px;
      background:${colors[i%colors.length]};border-radius:${Math.random()<.5?'50%':'2px'};
      opacity:.9;transform:rotate(${Math.random()*360}deg)`;
    c.appendChild(p);
    const dur=1400+Math.random()*1200;
    p.animate([{transform:`translateY(0) rotate(0)`},{transform:`translateY(110vh) rotate(${720*(Math.random()<.5?1:-1)}deg)`}],
      {duration:dur,easing:"cubic-bezier(.2,.6,.4,1)"});
    setTimeout(()=>p.remove(),dur);
  }
  setTimeout(()=>c.remove(),2800);
}

  document.body.removeEventListener("touchstart",once);
},{once:true});

render();
