<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pre-Sixth">
<meta name="theme-color" content="#0b1020">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Pre-Sixth Prep · KESW</title>
<style>
  :root{
    --bg:#0b1020; --bg2:#121a33; --card:#172244; --card2:#1d2a52;
    --line:#27355f; --txt:#eaf0ff; --mut:#93a1c9; --mut2:#6b7aa6;
    --acc:#6ea8fe; --acc2:#8b7bff; --good:#34d399; --bad:#fb7185; --warn:#fbbf24;
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    overscroll-behavior-y:none;}
  body{padding:env(safe-area-inset-top) 0 calc(72px + env(safe-area-inset-bottom));
    background:radial-gradient(120% 60% at 50% -10%, #1a2550 0%, var(--bg) 60%);min-height:100vh}
  .wrap{max-width:560px;margin:0 auto;padding:14px}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em}
  .mut{color:var(--mut)} .small{font-size:13px}
  .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .grow{flex:1}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  .hidden{display:none!important}

  /* top */
  .top{padding:8px 2px 4px}
  .brand{font-size:13px;color:var(--mut);letter-spacing:.18em;text-transform:uppercase;font-weight:700}
  .hi{font-size:24px;margin-top:2px}

  /* chips / stat */
  .stats{display:flex;gap:10px;margin-top:14px}
  .stat{flex:1;background:linear-gradient(160deg,var(--card),var(--bg2));border:1px solid var(--line);
    border-radius:var(--r);padding:12px}
  .stat b{font-size:22px;display:block;line-height:1.1}
  .stat span{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}

  .panel{background:linear-gradient(160deg,var(--card),var(--bg2));border:1px solid var(--line);
    border-radius:var(--r);padding:16px;margin-top:14px}

  /* ring */
  .ring{display:flex;align-items:center;gap:14px}
  .ringsvg{width:62px;height:62px;flex:none}
  .ringsvg circle{fill:none;stroke-width:7;stroke-linecap:round}
  .ringbg{stroke:#26345e}
  .ringfg{stroke:url(#g);transition:stroke-dashoffset .6s ease}

  /* countdown */
  .count{display:flex;gap:8px;margin-top:10px}
  .count div{flex:1;background:#101733;border:1px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center}
  .count b{font-size:20px;display:block}
  .count span{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}

  /* subject grid */
  .secttl{margin:20px 2px 8px;font-size:14px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .subj{position:relative;border:1px solid var(--line);border-radius:var(--r);padding:14px;
    background:var(--card);overflow:hidden;text-align:left;transition:transform .12s}
  .subj:active{transform:scale(.97)}
  .subj .ic{font-size:26px}
  .subj h3{font-size:16px;margin-top:8px}
  .subj .ex{font-size:11px;color:var(--mut2);margin-top:2px}
  .subj .bar{height:6px;border-radius:6px;background:#0f1730;margin-top:12px;overflow:hidden}
  .subj .bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
  .subj .pc{font-size:11px;color:var(--mut);margin-top:6px;display:flex;justify-content:space-between}
  .glow{position:absolute;inset:0;opacity:.14;pointer-events:none}

  /* generic card / list */
  .item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);
    border-radius:14px;background:var(--card);margin-bottom:10px}
  .badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}

  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;
    font-weight:700;font-size:15px;background:var(--card2);border:1px solid var(--line)}
  .btn.acc{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#0b1020}
  .btn.full{width:100%}
  .btn:active{filter:brightness(.95)}
  .btn.sm{padding:10px 12px;font-size:13px}
  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}

  /* flashcard */
  .deckwrap{margin-top:10px}
  .fcard{position:relative;height:360px;border-radius:22px}
  .face{position:absolute;top:0;left:0;width:100%;height:100%;
    border:1px solid var(--line);border-radius:22px;padding:22px;display:flex;flex-direction:column;
    justify-content:center;align-items:center;text-align:center;background:linear-gradient(160deg,var(--card2),var(--bg2));
    opacity:0;visibility:hidden;transform:scale(.96);transition:opacity .28s ease, transform .28s ease}
  .face.front{opacity:1;visibility:visible;transform:none}
  .fcard.flip .face.front{opacity:0;visibility:hidden;transform:scale(.96)}
  .fcard.flip .face.rear{opacity:1;visibility:visible;transform:none}
  .face.rear{justify-content:flex-start;align-items:flex-start;text-align:left;overflow:auto}
  .term{font-size:30px;font-weight:800;letter-spacing:-.02em}
  .ipa{color:var(--mut);margin-top:6px;font-size:14px}
  .tap{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:var(--mut2);font-size:12px}
  .speaker{margin-top:18px;width:64px;height:64px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:26px;background:#0f1730;border:1px solid var(--line)}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--acc);font-weight:700;margin:14px 0 4px}
  .ru{font-size:22px;font-weight:800}
  .def{margin-top:2px;color:var(--txt);line-height:1.45}
  .ex{color:var(--mut);font-style:italic;line-height:1.5;margin-top:2px}
  .progressline{height:6px;background:#0f1730;border-radius:6px;overflow:hidden;margin:6px 0 12px}
  .progressline i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .3s}

  /* quiz */
  .opt{padding:15px 16px;border:1px solid var(--line);border-radius:14px;background:var(--card);
    margin-bottom:10px;font-size:16px;font-weight:600;transition:.15s;text-align:left;width:100%}
  .opt:active{transform:scale(.99)}
  .opt.correct{background:rgba(52,211,153,.16);border-color:var(--good)}
  .opt.wrong{background:rgba(251,113,133,.14);border-color:var(--bad)}
  .opt.dim{opacity:.5}
  .qhead{font-size:13px;color:var(--mut);margin-bottom:6px}
  .qprompt{font-size:24px;font-weight:800;margin:4px 0 18px;line-height:1.25}

  /* bottom nav */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(13,19,40,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line);padding:8px 0 calc(6px + env(safe-area-inset-bottom))}
  .navin{max-width:560px;margin:0 auto;display:flex}
  .nav button{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10px;color:var(--mut2);padding:4px}
  .nav button .ni{font-size:21px}
  .nav button.on{color:var(--acc)}

  .iconbtn{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:18px}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:#0f1730;border:1px solid var(--line);padding:10px 16px;border-radius:999px;font-size:13px;
    transition:.25s;z-index:80;pointer-events:none;font-weight:600}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .pill{display:inline-flex;gap:6px;align-items:center;font-size:12px;color:var(--mut);
    background:#0f1730;border:1px solid var(--line);padding:5px 10px;border-radius:999px}
  .empty{text-align:center;color:var(--mut);padding:40px 20px}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .back{font-size:22px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    border-radius:12px;background:var(--card);border:1px solid var(--line)}
  .seg{display:flex;background:#0f1730;border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;margin-top:12px}
  .seg button{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:700;color:var(--mut);background:none}
  .seg button.on{background:var(--card2);color:var(--txt)}
  .tag{font-size:11px;color:var(--mut);background:#0f1730;border:1px solid var(--line);
    padding:4px 9px;border-radius:999px;margin:0 6px 6px 0;display:inline-block}
  .ok{color:var(--good)} .ko{color:var(--bad)}
  .fade{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .conf{position:fixed;inset:0;pointer-events:none;z-index:90}
</style>
</head>
<body>
<div id="app"></div>

<nav class="nav">
  <div class="navin">
    <button data-nav="home" class="on"><span class="ni">🏠</span>Главная</button>
    <button data-nav="subjects"><span class="ni">📚</span>Предметы</button>
    <button data-nav="daily"><span class="ni">⚡️</span>Тренировка</button>
    <button data-nav="progress"><span class="ni">📈</span>Прогресс</button>
  </div>
</nav>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   DATA — KESW Pre-Sixth (Year 11) survival vocabulary
   en = английский термин/фраза · ru = перевод · def = простое объяснение
   ex = пример в контексте (как это звучит на уроке)
   ========================================================================= */
const DATA = {
  classroom: {
    id:"classroom", name:"Язык урока", nameEn:"Classroom English", ic:"🗣️",
    exam:"Что реально говорит учитель",
    desc:"Фразы, которыми учителя дают инструкции, объясняют и проверяют, поняли ли вы. Это самое важное — выучи в первую очередь.",
    topics:["Инструкции","Объяснение","Проверка понимания","Учёба и оценки"],
    terms:[
      {en:"Turn to page 42",ru:"Откройте страницу 42",def:"Учитель просит открыть учебник на нужной странице.",ex:"Right everyone, turn to page 42 and look at the diagram."},
      {en:"Work in pairs",ru:"Работайте в парах",def:"Делать задание вдвоём с соседом.",ex:"Work in pairs and compare your answers."},
      {en:"Hand in your work",ru:"Сдайте работу",def:"Отдать выполненное задание учителю.",ex:"Please hand in your work by the end of the lesson."},
      {en:"Show your working",ru:"Покажите ход решения",def:"Записать все шаги, а не только ответ (важно в математике и науках).",ex:"You'll lose marks if you don't show your working."},
      {en:"Make a note of this",ru:"Запишите это",def:"Учитель просит записать важную информацию.",ex:"Make a note of this — it will come up in the exam."},
      {en:"Fill in the blanks",ru:"Заполните пропуски",def:"Вписать недостающие слова в задание.",ex:"Fill in the blanks using the words in the box."},
      {en:"Underline the key words",ru:"Подчеркните ключевые слова",def:"Выделить главные слова линией снизу.",ex:"Underline the key words in the question first."},
      {en:"Does that make sense?",ru:"Это понятно? / Логично?",def:"Учитель проверяет, поняли ли вы объяснение.",ex:"So we cancel the brackets — does that make sense?"},
      {en:"Are you with me?",ru:"Вы успеваете за мной?",def:"Проверка, не отстали ли вы.",ex:"We move x to the other side. Are you with me so far?"},
      {en:"In other words",ru:"Другими словами / То есть",def:"Учитель повторяет мысль проще.",ex:"It's elastic — in other words, demand changes a lot when the price changes."},
      {en:"Bear in mind",ru:"Имейте в виду",def:"Запомнить важную деталь.",ex:"Bear in mind that the units must be the same."},
      {en:"Let me give you an example",ru:"Давайте я приведу пример",def:"Учитель сейчас покажет конкретный случай.",ex:"Let me give you an example to make this clearer."},
      {en:"The key point is...",ru:"Главное — это...",def:"Сейчас прозвучит самое важное.",ex:"The key point is that energy is always conserved."},
      {en:"Could you repeat that?",ru:"Повторите, пожалуйста",def:"Вежливо попросить сказать ещё раз, если не расслышали.",ex:"Sorry, could you repeat that? I didn't catch the last part."},
      {en:"I'm not sure I follow",ru:"Я не совсем понял",def:"Вежливо сказать, что вы потеряли мысль.",ex:"I'm not sure I follow — could you explain the second step again?"},
      {en:"Could you clarify...?",ru:"Не могли бы вы уточнить...?",def:"Попросить объяснить непонятное место.",ex:"Could you clarify what you mean by 'net force'?"},
      {en:"Deadline / due date",ru:"Срок сдачи",def:"Последний день, когда можно сдать работу.",ex:"The deadline for the essay is Friday."},
      {en:"Homework / assignment",ru:"Домашнее задание",def:"Задание, которое делают дома.",ex:"For homework, finish the questions on page 50."},
      {en:"To revise",ru:"Повторять перед экзаменом",def:"В британском английском revise = готовиться к экзамену (НЕ «переписывать»).",ex:"Make sure you revise the whole topic for the test."},
      {en:"Mock exam",ru:"Пробный экзамен",def:"Тренировочный экзамен в условиях настоящего.",ex:"We have a mock exam after the half-term break."},
      {en:"Marks / grade",ru:"Баллы / оценка",def:"Marks — баллы за работу; grade — итоговая оценка (9–1).",ex:"You got 18 out of 20 marks — a really strong grade."},
      {en:"Feedback",ru:"Обратная связь / комментарии",def:"Что учитель написал о вашей работе и как её улучшить.",ex:"Read my feedback and act on it for next time."},
      {en:"Highlight",ru:"Выделить маркером",def:"Отметить текст цветом.",ex:"Highlight the words you don't understand."},
      {en:"Label the diagram",ru:"Подпишите схему",def:"Написать названия частей на рисунке.",ex:"Label the diagram of the heart with these terms."}
    ]
  },
  subjects:[
    {
      id:"english", name:"Английский", nameEn:"English Language & Literature", ic:"📖",
      exam:"AQA GCSE", color:"#6ea8fe",
      desc:"Термины анализа текста: как разбирать приёмы автора, структуру и смысл. Нужны для эссе по литературе и языку.",
      topics:["Литературные приёмы","Структура","Анализ"],
      terms:[
        {en:"Simile",ru:"Сравнение (как/словно)",def:"Сравнение двух вещей со словами 'like' или 'as'.",ex:"\"As brave as a lion\" is a simile."},
        {en:"Metaphor",ru:"Метафора",def:"Описание одной вещи как будто она — другая, без 'like/as'.",ex:"\"Time is a thief\" is a metaphor."},
        {en:"Personification",ru:"Олицетворение",def:"Когда неживому придают человеческие черты.",ex:"\"The wind whispered\" — personification of the wind."},
        {en:"Alliteration",ru:"Аллитерация",def:"Повтор одинакового согласного звука в начале слов.",ex:"\"Wild and windy weather\" uses alliteration."},
        {en:"Imagery",ru:"Образность",def:"Слова, создающие яркую картину в воображении (через 5 чувств).",ex:"The poem uses imagery of cold, grey seas."},
        {en:"Tone",ru:"Тон",def:"Отношение автора к теме (серьёзный, ироничный и т.д.).",ex:"The tone of the letter is angry and bitter."},
        {en:"Mood",ru:"Настроение (атмосфера)",def:"Чувство, которое текст вызывает у читателя.",ex:"The dark setting creates a tense mood."},
        {en:"Protagonist",ru:"Главный герой",def:"Центральный персонаж истории.",ex:"Macbeth is the protagonist of the play."},
        {en:"Foreshadowing",ru:"Предзнаменование",def:"Намёк на то, что произойдёт позже.",ex:"The storm is foreshadowing of the tragedy to come."},
        {en:"Connotation",ru:"Коннотация (скрытый смысл)",def:"Дополнительное чувство, которое несёт слово помимо прямого значения.",ex:"\"Home\" has warm connotations of safety."},
        {en:"Juxtaposition",ru:"Противопоставление",def:"Когда автор ставит рядом две контрастные вещи.",ex:"The juxtaposition of wealth and poverty shocks the reader."},
        {en:"Stanza",ru:"Строфа",def:"Группа строк в стихотворении (как абзац).",ex:"The poem has four stanzas of six lines each."},
        {en:"Dramatic irony",ru:"Драматическая ирония",def:"Когда зритель знает то, чего не знает персонаж.",ex:"Dramatic irony builds tension as we know the truth."},
        {en:"Rhetorical question",ru:"Риторический вопрос",def:"Вопрос, на который не ждут ответа — для воздействия.",ex:"\"How long must we wait?\" is a rhetorical question."},
        {en:"Audience",ru:"Аудитория (читатели)",def:"Те, для кого написан текст.",ex:"The article targets a teenage audience."},
        {en:"Purpose",ru:"Цель текста",def:"Зачем текст написан: убедить, развлечь, информировать.",ex:"Identify the purpose: to persuade or to inform?"},
        {en:"Infer",ru:"Делать вывод (между строк)",def:"Понять то, что прямо не написано, по подсказкам.",ex:"We can infer that the character is lonely."},
        {en:"Evidence / quotation",ru:"Доказательство / цитата",def:"Слова из текста, которыми вы подтверждаете свою мысль.",ex:"Always support your point with evidence from the text."},
        {en:"Analyse",ru:"Анализировать",def:"Подробно разобрать, КАК и ПОЧЕМУ автор использует приём.",ex:"Analyse how the writer creates fear in this paragraph."},
        {en:"Structure",ru:"Структура текста",def:"Как организован текст: порядок, начало, развитие, концовка.",ex:"Comment on the structure of the opening chapter."}
      ]
    },
    {
      id:"maths", name:"Математика", nameEn:"Mathematics", ic:"➗",
      exam:"Edexcel IGCSE (A)", color:"#34d399",
      desc:"Number, Algebra, Geometry, Statistics. Английские названия операций и фигур — чтобы понимать задания и объяснения у доски.",

/* flat list of every studyable module (classroom + subjects) */
const MODULES = [DATA.classroom, ...DATA.subjects];
function moduleById(id){ return MODULES.find(m=>m.id===id); }
function itemId(mid,i){ return mid+"#"+i; }
const TOTAL_ITEMS = MODULES.reduce((a,m)=>a+m.terms.length,0);
const DAILY_GOAL = 20;
const DEPARTURE = new Date("2026-09-01T00:00:00");

/* =========================================================================
   STATE
   ========================================================================= */
const SKEY="presixth_v2";
let S = load();
function load(){
  try{ const r=JSON.parse(localStorage.getItem(SKEY)); if(r) return r; }catch(e){}
  return { xp:0, streak:0, lastDay:null, todayCount:0, todayDay:null, mastery:{}, voice:null };
}
function save(){ localStorage.setItem(SKEY, JSON.stringify(S)); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function rollDay(){
  const t=todayStr();
  if(S.todayDay!==t){ S.todayDay=t; S.todayCount=0; }
}
function registerStudy(n){
  rollDay();
  const t=todayStr();
  if(S.lastDay!==t){
    // streak logic
    const y=new Date(); y.setDate(y.getDate()-1);
    const ys=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
    S.streak = (S.lastDay===ys)? (S.streak+1) : 1;
    S.lastDay=t;
  }
  S.xp += n;
  save();
}
function masteryOf(id){ return S.mastery[id]||0; }   // 0..5
function bump(id, up){
  const cur=masteryOf(id);
  S.mastery[id] = up ? Math.min(5,cur+1) : 0;
  save();
}
function moduleProgress(m){
  let learned=0;
  m.terms.forEach((_,i)=>{ if(masteryOf(itemId(m.id,i))>=3) learned++; });
  return {learned, total:m.terms.length, pct: Math.round(learned/m.terms.length*100)};
}
function overallLearned(){
  let n=0;
  MODULES.forEach(m=>m.terms.forEach((_,i)=>{ if(masteryOf(itemId(m.id,i))>=3) n++; }));
  return n;
}
function levelInfo(){
  const lv = Math.floor(S.xp/200)+1;
  const into = S.xp%200;
  return { lv, into, pct: Math.round(into/200*100) };
}

/* =========================================================================
   SPEECH (British voice)
   ========================================================================= */
let VOICES=[];
function loadVoices(){ VOICES = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
function pickVoice(){
  if(!VOICES.length) loadVoices();
  return VOICES.find(v=>/en[-_]GB/i.test(v.lang)) ||
         VOICES.find(v=>/Daniel|Kate|Serena|Arthur|UK English/i.test(v.name)) ||
         VOICES.find(v=>/^en/i.test(v.lang)) || null;
}
function speak(text, rate){
  if(!window.speechSynthesis) { toast("🔇 Озвучка недоступна на этом устройстве"); return; }
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.replace(/[²³]/g," squared "));
    const v=pickVoice(); if(v) u.voice=v;
    u.lang="en-GB"; u.rate=rate||0.9; u.pitch=1;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* =========================================================================
   ROUTER / VIEW
   ========================================================================= */
const app=document.getElementById("app");
let view={name:"home"};
function go(name, id){ view={name, id}; render(); window.scrollTo(0,0); }

document.querySelectorAll(".nav button").forEach(b=>{
  b.addEventListener("click",()=>go(b.dataset.nav));
});
function setNav(name){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on", b.dataset.nav===name));
}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1700);
}

function render(){
  rollDay();
  const navMap={home:"home",subjects:"subjects",subject:"subjects",study:"subjects",
    quiz:"subjects",listen:"subjects",daily:"daily",progress:"progress"};
  setNav(navMap[view.name]||"home");
  if(view.name==="home") return renderHome();
  if(view.name==="subjects") return renderSubjects();
  if(view.name==="subject") return renderSubject(view.id);
  if(view.name==="study") return renderStudy(view.id);
  if(view.name==="quiz") return renderQuiz(view.id);
  if(view.name==="listen") return renderListen(view.id);
  if(view.name==="daily") return renderDaily();
  if(view.name==="progress") return renderProgress();
}

    <circle class="ringbg" cx="31" cy="31" r="${r}"></circle>
    <circle class="ringfg" cx="31" cy="31" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}"

    <text x="31" y="36" text-anchor="middle" font-size="15" font-weight="800" fill="#eaf0ff">${pct}%</text>

let quiz={list:[],i:0,score:0,mid:null,locked:false};
function renderQuiz(id){
  const m=moduleById(id);
  const pool=m.terms.map((t,i)=>({t,i}));
  shuffle(pool);
  quiz={list:pool.slice(0,Math.min(10,pool.length)),i:0,score:0,mid:id,locked:false};
  drawQuiz();
}
function drawQuiz(){
  const m=moduleById(quiz.mid);
  if(quiz.i>=quiz.list.length) return quizDone(m);
  const cur=quiz.list[quiz.i];
  const reverse = Math.random()<0.5; // sometimes EN->RU, sometimes RU->EN
  const prompt = reverse ? cur.t.ru : cur.t.en;
  const answer = reverse ? cur.t.en : cur.t.ru;
  // build options
  const others=m.terms.filter((_,i)=>i!==cur.i);
  shuffle(others);
  const opts=[answer, ...others.slice(0,3).map(o=>reverse?o.en:o.ru)];
  shuffle(opts);
  quiz._answer=answer; quiz._reverse=reverse; quiz.locked=false;
  const pct=Math.round(quiz.i/quiz.list.length*100);
  app.innerHTML=`<div class="wrap fade">
    <div class="topbar">
      <button class="back" onclick="go('subject','${m.id}')">←</button>
      <div class="grow"><div class="brand">Тест · ${m.name}</div>
        <div class="progressline" style="margin-top:6px"><i style="width:${pct}%"></i></div></div>
      <span class="pill">${quiz.i+1}/${quiz.list.length}</span>
    </div>
    <div class="panel" style="text-align:center">
      <div class="qhead">${reverse?"Как это по-английски?":"Что это значит?"}
        ${reverse?"":`<button class="iconbtn" style="display:inline-flex;vertical-align:middle" onclick="speak('${esc(cur.t.en)}')">🔊</button>`}</div>
      <div class="qprompt">${prompt}</div>
    </div>
    <div id="opts">
      ${opts.map(o=>`<button class="opt" onclick="pickOpt(this,'${esc(o)}')">${o}</button>`).join("")}
    </div>
    <div class="between mut small" style="margin-top:6px">
      <span>Очки: ${quiz.score}</span><span>🔥 ${S.streak} дней</span></div>
  </div>`;
}
function pickOpt(btn,val){
  if(quiz.locked) return; quiz.locked=true;
  const correct = decode(val)===quiz._answer;
  const cur=quiz.list[quiz.i];
  document.querySelectorAll("#opts .opt").forEach(b=>{
    const bv=b.textContent;
    if(bv===quiz._answer) b.classList.add("correct");
    else b.classList.add("dim");
  });
  if(correct){ btn.classList.add("correct"); quiz.score++; bump(itemId(quiz.mid,cur.i),true); registerStudy(10); }
  else { btn.classList.remove("dim"); btn.classList.add("wrong"); bump(itemId(quiz.mid,cur.i),false); registerStudy(3);
    if(!quiz._reverse) speak(cur.t.en); }
  setTimeout(()=>{ quiz.i++; drawQuiz(); }, correct?650:1400);
}
function quizDone(m){
  const pct=Math.round(quiz.score/quiz.list.length*100);
  if(pct>=80) confetti();
  app.innerHTML=`<div class="wrap fade"><div class="empty">
    <div style="font-size:54px">${pct>=80?"🏆":pct>=50?"👍":"💪"}</div>
    <h2 style="margin:10px 0">${quiz.score} из ${quiz.list.length} верно</h2>

/* =========================================================================
   UTIL
   ========================================================================= */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return String(s)
  .replace(/&/g,"&amp;").replace(/"/g,"&quot;")
  .replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g," "); }
function decode(s){ return String(s).replace(/\\'/g,"'").replace(/\\\\/g,"\\"); }

function confetti(){
  const c=document.createElement("div"); c.className="conf"; document.body.appendChild(c);
  const colors=["#6ea8fe","#8b7bff","#34d399","#fbbf24","#fb7185"];
  for(let i=0;i<70;i++){
    const p=document.createElement("div");
    const s=6+Math.random()*8;
    p.style.cssText=`position:absolute;top:-20px;left:${Math.random()*100}%;width:${s}px;height:${s}px;
      background:${colors[i%colors.length]};border-radius:${Math.random()<.5?'50%':'2px'};
      opacity:.9;transform:rotate(${Math.random()*360}deg)`;
    c.appendChild(p);
    const dur=1400+Math.random()*1200;
    p.animate([{transform:`translateY(0) rotate(0)`},{transform:`translateY(110vh) rotate(${720*(Math.random()<.5?1:-1)}deg)`}],
      {duration:dur,easing:"cubic-bezier(.2,.6,.4,1)"});
    setTimeout(()=>p.remove(),dur);
  }
  setTimeout(()=>c.remove(),2800);
}

/* init: unlock speech on first interaction (iOS) */
document.body.addEventListener("touchstart",function once(){
  try{ const u=new SpeechSynthesisUtterance(" "); u.volume=0; speechSynthesis.speak(u); }catch(e){}
  document.body.removeEventListener("touchstart",once);
},{once:true});

render();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
